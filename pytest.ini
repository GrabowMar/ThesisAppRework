[tool:pytest]
# Pytest configuration for ThesisAppRework
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test discovery and execution options
addopts = 
    -v
    --strict-markers
    --strict-config
    --tb=short
    --no-header
    --disable-warnings
    --durations=10

# Custom markers for test categorization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, may use external services)
    analyzer: Tests involving analyzer services
    db: Tests requiring database
    slow: Slow tests that may be skipped in CI
    api: API endpoint tests
    websocket: WebSocket communication tests
    smoke: Basic smoke tests for critical functionality
    
# Test paths and patterns
norecursedirs = 
    .git
    .pytest_cache
    *.egg
    dist
    build
    venv
    .venv
    node_modules
    __pycache__
    .mypy_cache

# Logging configuration for tests
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Test timeout (in seconds)
timeout = 300

# Minimum Python version
minversion = 3.11

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore:.*SQLALCHEMY_TRACK_MODIFICATIONS.*:UserWarning
    ignore:.*SQLALCHEMY_DATABASE_URI.*:UserWarning