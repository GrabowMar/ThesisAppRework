# Modern Docker Compose for Analyzer Infrastructure
# Uses 2025 best practices: no version field, health checks, non-root users

services:
  # WebSocket Gateway
  gateway:
    build: .
    ports:
      - "8765:8765"
    environment:
      - LOG_LEVEL=INFO
      - GATEWAY_HOST=0.0.0.0
      - GATEWAY_PORT=8765
    healthcheck:
      test: ["CMD", "python", "health_check.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    user: "1000:1000"
    restart: unless-stopped
    networks:
      - analyzer-network
    depends_on:
      static-analyzer:
        condition: service_healthy
      dynamic-analyzer:
        condition: service_healthy
      performance-tester:
        condition: service_healthy
      security-analyzer:
        condition: service_healthy
      ai-analyzer:
        condition: service_healthy

  # Static Security & Quality Analyzer
  static-analyzer:
    build: ./services/static-analyzer
    ports:
      - "2001:2001"
    environment:
      - LOG_LEVEL=INFO
      - WEBSOCKET_HOST=0.0.0.0
      - WEBSOCKET_PORT=2001
      - PYTHONPATH=/app
    volumes:
      - ../misc/models:/app/sources:ro
      - static-results:/app/results
    healthcheck:
      test: ["CMD", "python", "health_check.py"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    user: "1000:1000"
    restart: unless-stopped
    networks:
      - analyzer-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'

  # Dynamic Security Analyzer (OWASP ZAP)
  dynamic-analyzer:
    build: ./services/dynamic-analyzer
    ports:
      - "2002:2002"
    environment:
      - LOG_LEVEL=INFO
      - WEBSOCKET_HOST=0.0.0.0
      - WEBSOCKET_PORT=2002
      - PYTHONPATH=/app
      - ZAP_PORT=8090
    volumes:
      - dynamic-results:/app/results
      - zap-data:/zap/data
    healthcheck:
      test: ["CMD", "python", "health_check.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    user: "1000:1000"
    restart: unless-stopped
    networks:
      - analyzer-network
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'

  # Performance Tester (Locust)
  performance-tester:
    build: ./services/performance-tester
    ports:
      - "2003:2003"
    environment:
      - LOG_LEVEL=INFO
      - WEBSOCKET_HOST=0.0.0.0
      - WEBSOCKET_PORT=2003
      - PYTHONPATH=/app
    volumes:
      - performance-reports:/app/reports
    healthcheck:
      test: ["CMD", "python", "health_check.py"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    user: "1000:1000"
    restart: unless-stopped
    networks:
      - analyzer-network
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'

  # AI-Powered Requirements & Code Analyzer
  ai-analyzer:
    build: ./services/ai-analyzer
    ports:
      - "2004:2004"
    environment:
      - LOG_LEVEL=INFO
      - WEBSOCKET_HOST=0.0.0.0
      - WEBSOCKET_PORT=2004
      - PYTHONPATH=/app
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    volumes:
      - ../misc/models:/app/sources:ro
      - ai-results:/app/results
    healthcheck:
      test: ["CMD", "python", "health_check.py"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    user: "1000:1000"
    restart: unless-stopped
    networks:
      - analyzer-network
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'

  # Security Analyzer (Bandit, Safety, etc.)
  security-analyzer:
    build: ./services/security-analyzer
    ports:
      - "2005:2005"
    environment:
      - LOG_LEVEL=INFO
      - WEBSOCKET_HOST=0.0.0.0
      - WEBSOCKET_PORT=2005
      - PYTHONPATH=/app
    volumes:
      - ../misc/models:/app/sources:ro
      - security-results:/app/results
    healthcheck:
      test: ["CMD", "python", "health_check.py"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    user: "1000:1000"
    restart: unless-stopped
    networks:
      - analyzer-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'

  # Redis for caching and task queues
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    user: "999:999"
    restart: unless-stopped
    networks:
      - analyzer-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.1'

volumes:
  static-results:
    driver: local
  dynamic-results:
    driver: local
  performance-reports:
    driver: local
  ai-results:
    driver: local
  security-results:
    driver: local
  zap-data:
    driver: local
  redis-data:
    driver: local

networks:
  analyzer-network:
    driver: bridge
