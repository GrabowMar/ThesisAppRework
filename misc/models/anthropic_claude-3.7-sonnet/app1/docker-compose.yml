version: '3.8'

services:
    backend:
        container_name: anthropic_claude_3_7_sonnet_app1_backend
        build:
            context: ./backend
            dockerfile: Dockerfile
        ports:
            - "6051:6051"  # external:internal
        environment:
            - FLASK_ENV=production
            - APP_PORT=6051
        networks:
            - app_net

    frontend:
        container_name: anthropic_claude_3_7_sonnet_app1_frontend
        build:
            context: ./frontend
            dockerfile: Dockerfile
        ports:
            - "9051:9051"
        environment:
            - VITE_BACKEND_API_TARGET=http://backend:6051
            - VITE_PORT=9051
        depends_on:
            - backend
        networks:
            - app_net

networks:
    app_net:
        driver: bridge
