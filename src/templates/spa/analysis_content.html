{# SPA Analysis inner content: lightweight hub or placeholder #}
<div data-page-title="Analysis Hub"></div>
<div class="container-fluid py-3">
  <div class="alert alert-info mb-3">
    <i class="fas fa-flask me-2"></i>Analysis hub content placeholder. Wire to views/analysis/hub.html when ready.
  </div>
  <div id="recent-activity" 
       hx-get="/api/dashboard/activity" 
       hx-trigger="load" 
       hx-target="#recent-activity" 
       hx-swap="innerHTML">
    <div class="text-center py-3">
      <div class="spinner-border spinner-border-sm text-primary" role="status">
        <span class="visually-hidden">Loading activity...</span>
      </div>
    </div>
  </div>
</div>
