{# slug: ui/elements/common/model_apps_select (auto-migrated) #}
{#
  Partial: Model Apps Select Options
  Usage: Returned by /analysis/get_model_apps to populate a <select> element's options via HTMX
  Context:
    - apps: list of GeneratedApplication rows for the selected model
    - model_slug: selected model slug (string)
    - select_id: optional target select id (string) — not required here since we replace innerHTML
#}

{% if apps and apps|length > 0 %}
  <option value="" selected disabled>Choose an application…</option>
  {% for app in apps %}
    <option value="{{ app.app_number }}">
      App {{ app.app_number }}{% if app.name %} — {{ app.name }}{% elif app.title %} — {{ app.title }}{% endif %}
    </option>
  {% endfor %}
{% else %}
  <option value="" selected disabled>No applications found for {{ model_slug }}</option>
{% endif %}
