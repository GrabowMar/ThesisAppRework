<div class="row g-2">
  {% for svc in services %}
    <div class="col-md-3">
      <div class="card h-100 service-card">
        <div class="card-body py-2 px-3">
          <div class="d-flex justify-content-between align-items-center">
            <strong class="small">{{ svc.name }}</strong>
            <span class="badge bg-{{ 'success' if svc.status=='healthy' else 'secondary' }}">{{ svc.status }}</span>
          </div>
          <div class="small text-muted">v{{ svc.version or '1.0' }}</div>
        </div>
      </div>
    </div>
  {% endfor %}
  {% if not services %}
    <div class="col-12 text-muted small">No analyzer services info available.</div>
  {% endif %}
</div>
