<div class="alert alert-{{ type|default('danger') }} border-0 shadow-sm" role="alert">
    <div class="d-flex align-items-center">
        <div class="me-3">
            <i class="fas fa-{{ icon|default('exclamation-triangle') }} fa-2x"></i>
        </div>
        <div class="flex-grow-1">
            <h6 class="alert-heading mb-1">{{ title|default('Error') }}</h6>
            <p class="mb-2">{{ message|default('An unexpected error occurred. Please try again later.') }}</p>
            {% if details %}
                <details class="mt-2">
                    <summary class="btn btn-sm btn-outline-secondary">Show Details</summary>
                    <div class="mt-2">
                        <pre class="small text-muted">{{ details }}</pre>
                    </div>
                </details>
            {% endif %}
            {% if retry_action %}
                <button class="btn btn-sm btn-outline-primary mt-2" onclick="{{ retry_action }}">
                    <i class="fas fa-redo me-1"></i>Try Again
                </button>
            {% endif %}
        </div>
    </div>
</div>
