<!-- Sidebar Statistics Widget -->
<div id="sidebar-stats" class="sidebar-stats">
    <div class="row">
        <div class="col-6 mb-2">
            <div class="stat-item text-center">
                <div class="stat-value text-primary fw-bold">{{ stats.total_models or 0 }}</div>
                <small class="stat-label text-muted">AI Models</small>
            </div>
        </div>
        <div class="col-6 mb-2">
            <div class="stat-item text-center">
                <div class="stat-value text-success fw-bold">{{ stats.total_apps or 0 }}</div>
                <small class="stat-label text-muted">Apps</small>
            </div>
        </div>
        <div class="col-6">
            <div class="stat-item text-center">
                <div class="stat-value text-warning fw-bold">{{ stats.security_tests or 0 }}</div>
                <small class="stat-label text-muted">Security Tests</small>
            </div>
        </div>
        <div class="col-6">
            <div class="stat-item text-center">
                <div class="stat-value text-info fw-bold">{{ stats.performance_tests or 0 }}</div>
                <small class="stat-label text-muted">Performance Tests</small>
            </div>
        </div>
    </div>
    
    <!-- Quick Actions -->
    <div class="mt-3 pt-2 border-top">
        <div class="d-grid gap-1">
            <button class="btn btn-outline-primary btn-sm" 
                    hx-get="{{ url_for('api.dashboard_stats') }}" 
                    hx-target="#sidebar-stats" 
                    hx-swap="innerHTML">
                <i class="fas fa-sync me-1"></i>Refresh
            </button>
        </div>
    </div>
</div>
