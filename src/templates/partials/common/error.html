{# Generic error fragment used by routes when rendering errors #}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="alert alert-danger" role="alert">
        <h4 class="alert-heading">An error occurred</h4>
        <p class="mb-0">{{ error if error is defined else 'Unknown error' }}</p>
      </div>
    </div>
  </div>
</div>
