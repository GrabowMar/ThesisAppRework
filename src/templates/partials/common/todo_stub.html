{# AdminLTE (dist) integration note #}
<div class="border rounded p-3 bg-light-subtle">
  <div class="d-flex justify-content-between align-items-center">
    <div>
      <div class="fw-semibold">{{ title or 'Coming Soon' }}</div>
      <div class="text-muted small">{{ message or 'This feature is under construction.' }}</div>
    </div>
    {% if action_url and action_label %}
    <div>
      <a class="btn btn-sm btn-outline-primary" href="{{ action_url }}" target="_blank">
        <i class="fas fa-external-link-alt me-1"></i>{{ action_label }}
      </a>
    </div>
    {% endif %}
  </div>
</div>
