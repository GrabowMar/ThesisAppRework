<form id="batch-create-form" hx-post="/api/batch/create" hx-target="#batch-result">
    <div class="row">
        <div class="col-md-6">
            <div class="mb-3">
                <label for="batch-name" class="form-label">Batch Name</label>
                <input type="text" class="form-control" id="batch-name" name="name" required>
            </div>
        </div>
        <div class="col-md-6">
            <div class="mb-3">
                <label for="batch-type" class="form-label">Analysis Type</label>
                <select class="form-select" id="batch-type" name="analysis_type" required>
                    <option value="">Select analysis type...</option>
                    <option value="security">Security Analysis</option>
                    <option value="performance">Performance Analysis</option>
                    <option value="both">Both Security & Performance</option>
                </select>
            </div>
        </div>
    </div>
    
    <div class="mb-3">
        <label for="batch-models" class="form-label">Target Models</label>
        <select class="form-select" id="batch-models" name="models" multiple size="6">
            {% for model in models %}
                <option value="{{ model.model_slug }}">
                    {{ model.provider|title }} - {{ model.model_name }}
                </option>
            {% endfor %}
        </select>
        <div class="form-text">Hold Ctrl/Cmd to select multiple models</div>
    </div>
    
    <div class="mb-3">
        <label for="batch-description" class="form-label">Description (Optional)</label>
        <textarea class="form-control" id="batch-description" name="description" rows="3" 
                  placeholder="Describe the purpose of this batch analysis..."></textarea>
    </div>
    
    <div class="mb-3">
        <div class="row">
            <div class="col-md-6">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="auto-start" name="auto_start" checked>
                    <label class="form-check-label" for="auto-start">
                        Start immediately
                    </label>
                </div>
            </div>
            <div class="col-md-6">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="notify-completion" name="notify_completion">
                    <label class="form-check-label" for="notify-completion">
                        Notify on completion
                    </label>
                </div>
            </div>
        </div>
    </div>
    
    <div class="d-flex justify-content-end gap-2">
        <button type="button" class="btn btn-secondary" onclick="cancelBatchForm()">Cancel</button>
        <button type="submit" class="btn btn-primary">
            <i class="fas fa-play me-1"></i>Create Batch
        </button>
    </div>
</form>

<div id="batch-result" class="mt-3"></div>

<script>
function cancelBatchForm() {
    // TODO: Close modal or form
    console.log('Cancel batch form - TODO');
}

// Form validation
document.getElementById('batch-create-form').addEventListener('submit', function(e) {
    const models = document.getElementById('batch-models');
    if (models.selectedOptions.length === 0) {
        e.preventDefault();
        alert('Please select at least one model for the batch analysis.');
        return false;
    }
});
</script>
