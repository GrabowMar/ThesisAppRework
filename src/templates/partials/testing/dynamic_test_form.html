<!-- Dynamic (ZAP) Security Test Form -->
<div class="card border-0 shadow-sm h-100">
    <div class="card-header bg-info text-white border-0">
        <div class="d-flex align-items-center">
            <div class="bg-white bg-opacity-25 rounded-circle p-2 me-3">
                <i class="fas fa-bolt text-white"></i>
            </div>
            <div>
                <h6 class="mb-0 text-white">Dynamic Security Scan</h6>
                <small class="text-white-50">OWASP ZAP-like active/baseline scan</small>
            </div>
        </div>
    </div>

    <div class="card-body">
        <form id="dynamicTestForm" hx-post="{{ url_for('analysis.start_dynamic_analysis') }}"
              hx-target="#dynamic-test-result" hx-indicator="#dynamicTestSpinner">

            <!-- Model Selection -->
            <div class="mb-3">
                <label for="dynamic_model_select" class="form-label fw-medium">
                    <i class="fas fa-robot me-1 text-primary"></i>AI Model
                </label>
                <select class="form-select" id="dynamic_model_select" name="model_slug" required
                        hx-get="{{ url_for('analysis.get_model_apps') }}"
                        hx-target="#dynamic_app_select_container"
                        hx-trigger="change">
                    <option value="">Choose a model...</option>
                    {% for model in models %}
                    <option value="{{ model.model_slug }}"
                            data-provider="{{ model.provider }}"
                            data-capabilities="{{ model.capabilities }}">
                        {{ model.model_name }} ({{ model.provider }})
                    </option>
                    {% endfor %}
                </select>
                <div class="form-text">
                    <i class="fas fa-info-circle me-1"></i>
                    Select the AI model whose generated app you'll scan
                </div>
            </div>

            <!-- Application Selection -->
            <div class="mb-3" id="dynamic_app_select_container">
                <label for="dynamic_app_select" class="form-label fw-medium">
                    <i class="fas fa-code me-1 text-success"></i>Application
                </label>
                <select class="form-select" id="dynamic_app_select" name="app_number" disabled>
                    <option value="">Choose a model first...</option>
                </select>
                <div class="form-text">
                    <i class="fas fa-info-circle me-1"></i>
                    Select the application to scan
                </div>
            </div>

            <!-- Target and Scan Options -->
            <div class="mb-3">
                <label class="form-label fw-medium">
                    <i class="fas fa-crosshairs me-1 text-warning"></i>Target & Options
                </label>
                <div class="border rounded p-3 bg-light">
                    <div class="row g-3">
                        <div class="col-12">
                            <label for="target_url" class="form-label">Target URL (optional)</label>
                            <input type="url" class="form-control" id="target_url" name="target_url"
                                   placeholder="http://localhost:9051">
                            <div class="form-text">Defaults to the app's allocated frontend port if omitted.</div>
                        </div>
                        <div class="col-md-6">
                            <label for="scan_type" class="form-label">Scan Type</label>
                            <select class="form-select" id="scan_type" name="scan_type">
                                <option value="baseline" selected>Baseline (Passive)</option>
                                <option value="active">Active (Attacks)</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="timeout" class="form-label">Timeout (minutes)</label>
                            <input type="number" class="form-control" id="timeout" name="timeout" value="30" min="1" max="120">
                        </div>
                    </div>
                    <div class="row g-3 mt-1">
                        <div class="col-12">
                            <label for="include_paths" class="form-label">Include Paths (comma-separated)</label>
                            <input type="text" class="form-control" id="include_paths" name="include_paths"
                                   placeholder="/api,/login">
                        </div>
                        <div class="col-12">
                            <label for="exclude_paths" class="form-label">Exclude Paths (comma-separated)</label>
                            <input type="text" class="form-control" id="exclude_paths" name="exclude_paths"
                                   placeholder="/admin,/static">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-info text-white">
                    <span id="dynamicTestSpinner" class="spinner-border spinner-border-sm me-2 d-none"></span>
                    <i class="fas fa-bolt me-2"></i>Start Dynamic Scan
                </button>
                <button type="button" class="btn btn-outline-secondary" onclick="resetDynamicForm()">
                    <i class="fas fa-undo me-2"></i>Reset Form
                </button>
            </div>
        </form>
    </div>

    <!-- Results Section -->
    <div class="card-footer bg-light border-0 d-none" id="dynamic-test-result">
        <!-- Results will be loaded here -->
    </div>
</div>

<script>
function resetDynamicForm() {
    document.getElementById('dynamicTestForm').reset();
}
</script>
