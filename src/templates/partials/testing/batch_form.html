<!-- Batch Form Partial -->
<form hx-post="{{ url_for('batch.create_batch') }}" hx-target="#batch-result">
    <div class="mb-3">
        <label for="batch_name" class="form-label">Batch Name</label>
        <input type="text" class="form-control" id="batch_name" name="batch_name" placeholder="Enter batch name">
    </div>
    
    <div class="mb-3">
        <label for="batch_description" class="form-label">Description</label>
        <textarea class="form-control" id="batch_description" name="batch_description" rows="3" placeholder="Enter batch description"></textarea>
    </div>
    
    <div class="mb-3">
        <label for="models" class="form-label">Select Models</label>
        <select class="form-select" id="models" name="models" multiple>
            {% for model in models %}
            <option value="{{ model.model_slug }}">{{ model.model_name }} ({{ model.provider }})</option>
            {% endfor %}
        </select>
        <div class="form-text">Hold Ctrl/Cmd to select multiple models</div>
    </div>
    
    <div class="mb-3">
        <label class="form-label">Analysis Types</label>
        <div class="form-check">
            <input class="form-check-input" type="checkbox" id="security_analysis" name="analysis_types" value="security" checked>
            <label class="form-check-label" for="security_analysis">
                Security Analysis
            </label>
        </div>
        <div class="form-check">
            <input class="form-check-input" type="checkbox" id="performance_analysis" name="analysis_types" value="performance" checked>
            <label class="form-check-label" for="performance_analysis">
                Performance Analysis
            </label>
        </div>
    </div>
    
    <div class="mb-3">
        <label for="priority" class="form-label">Priority</label>
        <select class="form-select" id="priority" name="priority">
            <option value="low">Low</option>
            <option value="normal" selected>Normal</option>
            <option value="high">High</option>
        </select>
    </div>
    
    <div class="d-grid">
        <button type="submit" class="btn btn-primary">
            <i class="fas fa-play"></i> Create Batch
        </button>
    </div>
</form>
