<!-- Enhanced Batch Test Form -->
<div class="card border-0 shadow-sm h-100">
    <div class="card-header bg-primary text-white border-0">
        <div class="d-flex align-items-center">
            <div class="bg-white bg-opacity-25 rounded-circle p-2 me-3">
                <i class="fas fa-layer-group text-white"></i>
            </div>
            <div>
                <h6 class="mb-0 text-white">Batch Operations</h6>
                <small class="text-white-50">Multiple model analysis</small>
            </div>
        </div>
    </div>
    
    <div class="card-body">
        <form id="batchTestForm" hx-post="{{ url_for('batch.create_batch') }}" 
              hx-target="#batch-result" hx-indicator="#batchTestSpinner">
            
            <!-- Batch Information -->
            <div class="border rounded p-3 mb-3 bg-light">
                <h6 class="text-muted mb-3">
                    <i class="fas fa-info-circle me-1"></i>Batch Information
                </h6>
                
                <div class="mb-3">
                    <label for="batch_name" class="form-label fw-medium">
                        <i class="fas fa-tag me-1 text-primary"></i>Batch Name
                    </label>
                    <input type="text" class="form-control" id="batch_name" name="batch_name" 
                           placeholder="e.g., Security Audit - Q1 2024" required>
                    <div class="form-text">
                        <i class="fas fa-lightbulb me-1"></i>
                        Choose a descriptive name for tracking
                    </div>
                </div>
                
                <div class="mb-3">
                    <label for="batch_description" class="form-label fw-medium">
                        <i class="fas fa-align-left me-1 text-success"></i>Description
                    </label>
                    <textarea class="form-control" id="batch_description" name="batch_description" 
                              rows="3" placeholder="Describe the purpose and scope of this batch analysis..."></textarea>
                    <div class="form-text">
                        <i class="fas fa-info-circle me-1"></i>
                        Optional but recommended for documentation
                    </div>
                </div>
            </div>
            
            <!-- Model Selection -->
            <div class="mb-3">
                <label for="models" class="form-label fw-medium">
                    <i class="fas fa-robot me-1 text-primary"></i>AI Models
                </label>
                <div class="border rounded p-3 bg-light">
                    <div class="mb-2">
                        <div class="d-flex justify-content-between align-items-center">
                            <small class="text-muted">
                                <i class="fas fa-mouse-pointer me-1"></i>
                                Click to select models
                            </small>
                            <div>
                                <button type="button" class="btn btn-outline-secondary btn-sm me-1" onclick="selectAllModels()">
                                    <i class="fas fa-check-double"></i> All
                                </button>
                                <button type="button" class="btn btn-outline-secondary btn-sm" onclick="clearAllModels()">
                                    <i class="fas fa-times"></i> None
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="row" id="model-selection">
                        {% for model in models %}
                        <div class="col-md-6 mb-2">
                            <div class="form-check p-2 border rounded bg-white">
                                <input class="form-check-input" type="checkbox" 
                                       id="model_{{ loop.index }}" name="models" value="{{ model.model_slug }}">
                                <label class="form-check-label w-100" for="model_{{ loop.index }}">
                                    <div class="d-flex justify-content-between align-items-center">
                                        <div>
                                            <strong>{{ model.model_name }}</strong>
                                            <br><small class="text-muted">{{ model.provider }}</small>
                                        </div>
                                        <div class="text-end">
                                            <span class="badge bg-secondary">{{ model.provider }}</span>
                                        </div>
                                    </div>
                                </label>
                            </div>
                        </div>
                        {% endfor %}
                    </div>
                    
                    <div class="mt-2">
                        <small class="text-muted">
                            <span id="selected-models-count">0</span> models selected
                        </small>
                    </div>
                </div>
            </div>
            
            <!-- Application Range -->
            <div class="mb-3">
                <label class="form-label fw-medium">
                    <i class="fas fa-code me-1 text-success"></i>Application Range
                </label>
                <div class="border rounded p-3 bg-light">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="app_range" 
                                       id="app_range_all" value="all" checked onchange="toggleAppRange()">
                                <label class="form-check-label" for="app_range_all">
                                    <i class="fas fa-globe me-1"></i>All Applications
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="app_range" 
                                       id="app_range_custom" value="custom" onchange="toggleAppRange()">
                                <label class="form-check-label" for="app_range_custom">
                                    <i class="fas fa-sliders-h me-1"></i>Custom Range
                                </label>
                            </div>
                        </div>
                    </div>
                    
                    <div id="custom-app-range" class="mt-3" style="display: none;">
                        <div class="row">
                            <div class="col-md-6">
                                <label for="app_start" class="form-label">Start App Number</label>
                                <input type="number" class="form-control" id="app_start" 
                                       name="app_start" value="1" min="1" max="20">
                            </div>
                            <div class="col-md-6">
                                <label for="app_end" class="form-label">End App Number</label>
                                <input type="number" class="form-control" id="app_end" 
                                       name="app_end" value="20" min="1" max="20">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Analysis Types -->
            <div class="mb-3">
                <label class="form-label fw-medium">
                    <i class="fas fa-microscope me-1 text-warning"></i>Analysis Types
                </label>
                <div class="border rounded p-3 bg-light">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-check p-2 border rounded bg-white mb-2">
                                <input class="form-check-input" type="checkbox" id="security_analysis" 
                                       name="analysis_types" value="security" checked>
                                <label class="form-check-label w-100" for="security_analysis">
                                    <div class="d-flex align-items-center">
                                        <i class="fas fa-shield-alt text-danger me-2"></i>
                                        <div>
                                            <strong>Security Analysis</strong>
                                            <br><small class="text-muted">Vulnerability scanning & code analysis</small>
                                        </div>
                                    </div>
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-check p-2 border rounded bg-white mb-2">
                                <input class="form-check-input" type="checkbox" id="performance_analysis" 
                                       name="analysis_types" value="performance" checked>
                                <label class="form-check-label w-100" for="performance_analysis">
                                    <div class="d-flex align-items-center">
                                        <i class="fas fa-tachometer-alt text-warning me-2"></i>
                                        <div>
                                            <strong>Performance Analysis</strong>
                                            <br><small class="text-muted">Load testing & benchmarking</small>
                                        </div>
                                    </div>
                                </label>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-check p-2 border rounded bg-white mb-2">
                                <input class="form-check-input" type="checkbox" id="static_analysis" 
                                       name="analysis_types" value="static">
                                <label class="form-check-label w-100" for="static_analysis">
                                    <div class="d-flex align-items-center">
                                        <i class="fas fa-search text-info me-2"></i>
                                        <div>
                                            <strong>Static Analysis</strong>
                                            <br><small class="text-muted">Code quality & structure</small>
                                        </div>
                                    </div>
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-check p-2 border rounded bg-white mb-2">
                                <input class="form-check-input" type="checkbox" id="ai_analysis" 
                                       name="analysis_types" value="ai">
                                <label class="form-check-label w-100" for="ai_analysis">
                                    <div class="d-flex align-items-center">
                                        <i class="fas fa-brain text-success me-2"></i>
                                        <div>
                                            <strong>AI Analysis</strong>
                                            <br><small class="text-muted">Intelligent code review</small>
                                        </div>
                                    </div>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Execution Settings -->
            <div class="mb-3">
                <label class="form-label fw-medium">
                    <i class="fas fa-cog me-1 text-secondary"></i>Execution Settings
                </label>
                <div class="border rounded p-3 bg-light">
                    <div class="row">
                        <div class="col-md-4">
                            <label for="priority" class="form-label">Priority</label>
                            <select class="form-select" id="priority" name="priority">
                                <option value="low">
                                    <i class="fas fa-arrow-down"></i> Low Priority
                                </option>
                                <option value="normal" selected>
                                    <i class="fas fa-arrow-right"></i> Normal Priority
                                </option>
                                <option value="high">
                                    <i class="fas fa-arrow-up"></i> High Priority
                                </option>
                                <option value="urgent">
                                    <i class="fas fa-exclamation"></i> Urgent
                                </option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label for="parallel_jobs" class="form-label">Parallel Jobs</label>
                            <select class="form-select" id="parallel_jobs" name="parallel_jobs">
                                <option value="1">1 (Sequential)</option>
                                <option value="2" selected>2 Jobs</option>
                                <option value="4">4 Jobs</option>
                                <option value="8">8 Jobs</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label for="timeout" class="form-label">Timeout (hours)</label>
                            <input type="number" class="form-control" id="timeout" name="timeout" 
                                   value="2" min="0.5" max="24" step="0.5">
                        </div>
                    </div>
                    
                    <div class="row mt-3">
                        <div class="col-md-6">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="stop_on_failure" 
                                       name="stop_on_failure" value="true">
                                <label class="form-check-label" for="stop_on_failure">
                                    Stop on First Failure
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="email_notification" 
                                       name="email_notification" value="true" checked>
                                <label class="form-check-label" for="email_notification">
                                    Email Notification
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Estimated Resources -->
            <div class="alert alert-info mb-3">
                <div class="d-flex align-items-center">
                    <i class="fas fa-calculator me-3 fs-4"></i>
                    <div>
                        <h6 class="mb-1">Estimated Resources</h6>
                        <div class="row text-sm">
                            <div class="col-md-4">
                                <strong>Models:</strong> <span id="est-models">0</span>
                            </div>
                            <div class="col-md-4">
                                <strong>Tests:</strong> <span id="est-tests">0</span>
                            </div>
                            <div class="col-md-4">
                                <strong>Duration:</strong> <span id="est-duration">~0 min</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Action Buttons -->
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary btn-lg">
                    <span id="batchTestSpinner" class="spinner-border spinner-border-sm me-2" style="display: none;"></span>
                    <i class="fas fa-rocket me-2"></i>Start Batch Analysis
                </button>
                <div class="row">
                    <div class="col-md-6">
                        <button type="button" class="btn btn-outline-secondary w-100" onclick="resetBatchForm()">
                            <i class="fas fa-undo me-2"></i>Reset Form
                        </button>
                    </div>
                    <div class="col-md-6">
                        <button type="button" class="btn btn-outline-info w-100" onclick="saveBatchTemplate()">
                            <i class="fas fa-save me-2"></i>Save Template
                        </button>
                    </div>
                </div>
            </div>
        </form>
    </div>
    
    <!-- Results Section -->
    <div class="card-footer bg-light border-0" id="batch-result" style="display: none;">
        <!-- Results will be loaded here -->
    </div>
</div>

<script>
function selectAllModels() {
    document.querySelectorAll('input[name="models"]').forEach(cb => cb.checked = true);
    updateEstimates();
}

function clearAllModels() {
    document.querySelectorAll('input[name="models"]').forEach(cb => cb.checked = false);
    updateEstimates();
}

function toggleAppRange() {
    const customRange = document.getElementById('custom-app-range');
    const isCustom = document.getElementById('app_range_custom').checked;
    customRange.style.display = isCustom ? 'block' : 'none';
    updateEstimates();
}

function updateEstimates() {
    const selectedModels = document.querySelectorAll('input[name="models"]:checked').length;
    const selectedAnalyses = document.querySelectorAll('input[name="analysis_types"]:checked').length;
    
    let appCount = 20; // Default all apps
    if (document.getElementById('app_range_custom').checked) {
        const start = parseInt(document.getElementById('app_start').value) || 1;
        const end = parseInt(document.getElementById('app_end').value) || 20;
        appCount = Math.max(0, end - start + 1);
    }
    
    const totalTests = selectedModels * appCount * selectedAnalyses;
    const parallelJobs = parseInt(document.getElementById('parallel_jobs').value) || 2;
    const estimatedMinutes = Math.ceil(totalTests * 5 / parallelJobs); // 5 min per test average
    
    document.getElementById('selected-models-count').textContent = selectedModels;
    document.getElementById('est-models').textContent = selectedModels;
    document.getElementById('est-tests').textContent = totalTests;
    document.getElementById('est-duration').textContent = `~${estimatedMinutes} min`;
}

function resetBatchForm() {
    document.getElementById('batchTestForm').reset();
    document.getElementById('custom-app-range').style.display = 'none';
    updateEstimates();
}

function saveBatchTemplate() {
    // TODO: Implement template saving functionality
    alert('Template saving functionality coming soon!');
}

// Event listeners
document.addEventListener('DOMContentLoaded', function() {
    // Update estimates when form changes
    document.querySelectorAll('input, select').forEach(element => {
        element.addEventListener('change', updateEstimates);
    });
    
    updateEstimates();
});
</script>
