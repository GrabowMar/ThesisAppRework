<!-- Real-time Dashboard Partial -->
<div class="realtime-dashboard" 
     hx-get="{{ url_for('api.dashboard_activity') }}" 
     hx-trigger="load, every 10s" 
     hx-swap="innerHTML">
    
    <!-- System Health Section -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">
                        <i class="fas fa-heartbeat me-2"></i>
                        System Health
                    </h5>
                    <div class="system-health-indicator">
                        <span class="badge bg-success">
                            <i class="fas fa-circle pulse me-1"></i>
                            Online
                        </span>
                    </div>
                </div>
                <div class="card-body" 
                     hx-get="{{ url_for('api.dashboard_system_status') }}" 
                     hx-trigger="load, every 30s" 
                     hx-swap="innerHTML">
                    <div class="text-center py-3">
                        <div class="spinner-border spinner-border-sm text-primary" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Active Tasks Section -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">
                        <i class="fas fa-tasks me-2"></i>
                        Active Tasks
                    </h5>
                    <button class="btn btn-sm btn-outline-primary" 
                            hx-get="{{ url_for('api.api_tasks_active') }}" 
                            hx-target="#active-tasks-container" 
                            hx-swap="innerHTML">
                        <i class="fas fa-sync-alt me-1"></i>
                        Refresh
                    </button>
                </div>
                <div class="card-body" id="active-tasks-container" 
                     hx-get="{{ url_for('api.api_tasks_active') }}" 
                     hx-trigger="load, every 15s" 
                     hx-swap="innerHTML">
                    <div class="text-center py-3">
                        <div class="spinner-border spinner-border-sm text-primary" role="status">
                            <span class="visually-hidden">Loading tasks...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Recent Activity Section -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0">
                        <i class="fas fa-history me-2"></i>
                        Recent Activity
                    </h5>
                </div>
                <div class="card-body" 
                     hx-get="{{ url_for('api.dashboard_activity') }}" 
                     hx-trigger="load, every 20s" 
                     hx-swap="innerHTML">
                    <div class="text-center py-3">
                        <div class="spinner-border spinner-border-sm text-primary" role="status">
                            <span class="visually-hidden">Loading activity...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Recent Models Section -->
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0">
                        <i class="fas fa-robot me-2"></i>
                        Recent Models
                    </h5>
                </div>
                <div class="card-body" 
                     hx-get="{{ url_for('api.dashboard_recent_models') }}" 
                     hx-trigger="load, every 60s" 
                     hx-swap="innerHTML">
                    <div class="text-center py-3">
                        <div class="spinner-border spinner-border-sm text-primary" role="status">
                            <span class="visually-hidden">Loading models...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Custom CSS for real-time dashboard -->
<style>
.realtime-dashboard .pulse {
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { opacity: 1; }
    50% { opacity: 0.5; }
    100% { opacity: 1; }
}

.system-health-indicator .badge {
    font-size: 0.8em;
}

.realtime-dashboard .card {
    transition: all 0.3s ease;
}

.realtime-dashboard .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

.task-status-card {
    border: 1px solid #dee2e6;
    border-radius: 0.375rem;
    padding: 0.75rem;
    margin-bottom: 0.5rem;
    background-color: #fff;
    transition: all 0.2s ease;
}

.task-status-card:hover {
    border-color: #0d6efd;
    box-shadow: 0 2px 4px rgba(13, 110, 253, 0.1);
}

.realtime-dashboard .spinner-border-sm {
    width: 1rem;
    height: 1rem;
}
</style>

<!-- JavaScript for enhanced real-time features -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Add connection status indicator
    let isOnline = true;
    
    // Listen for HTMX events
    document.body.addEventListener('htmx:responseError', function(evt) {
        if (isOnline) {
            isOnline = false;
            updateConnectionStatus(false);
        }
    });
    
    document.body.addEventListener('htmx:afterRequest', function(evt) {
        if (!isOnline && evt.detail.xhr.status === 200) {
            isOnline = true;
            updateConnectionStatus(true);
        }
    });
    
    function updateConnectionStatus(online) {
        const indicator = document.querySelector('.system-health-indicator .badge');
        if (indicator) {
            if (online) {
                indicator.className = 'badge bg-success';
                indicator.innerHTML = '<i class="fas fa-circle pulse me-1"></i>Online';
            } else {
                indicator.className = 'badge bg-danger';
                indicator.innerHTML = '<i class="fas fa-circle me-1"></i>Offline';
            }
        }
    }
    
    // Add smooth transitions for content updates
    document.body.addEventListener('htmx:beforeSwap', function(evt) {
        evt.target.style.opacity = '0.7';
        evt.target.style.transition = 'opacity 0.2s ease';
    });
    
    document.body.addEventListener('htmx:afterSwap', function(evt) {
        evt.target.style.opacity = '1';
    });
});
</script>
