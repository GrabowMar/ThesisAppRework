<div class="stats-summary" id="sidebar-stats-content">
    <div class="stat-item">
        <div class="stat-value">{{ stats.total_models or 0 }}</div>
        <div class="stat-label">Models</div>
    </div>
    <div class="stat-item">
        <div class="stat-value">{{ stats.total_apps or 0 }}</div>
        <div class="stat-label">Apps</div>
    </div>
    <div class="stat-item">
        <div class="stat-value">{{ stats.security_tests or 0 }}</div>
        <div class="stat-label">Security Tests</div>
    </div>
    <div class="stat-item">
        <div class="stat-value">{{ stats.performance_tests or 0 }}</div>
        <div class="stat-label">Performance Tests</div>
    </div>
</div>
