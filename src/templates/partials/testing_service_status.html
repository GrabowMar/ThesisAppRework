<div class="service-status-grid">
    <div class="row">
        <div class="col-md-4">
            <div class="service-status-card">
                <div class="service-header">
                    <i class="fas fa-tasks mr-2"></i>
                    <span>Background Service</span>
                </div>
                <div class="service-status">
                    <span class="badge badge-{{ 'success' if status.background_service == 'available' else 'warning' }}">
                        {{ status.background_service|title }}
                    </span>
                </div>
            </div>
        </div>
        
        <div class="col-md-4">
            <div class="service-status-card">
                <div class="service-header">
                    <i class="fas fa-cogs mr-2"></i>
                    <span>Task Manager</span>
                </div>
                <div class="service-status">
                    <span class="badge badge-{{ 'success' if status.task_manager == 'available' else 'warning' }}">
                        {{ status.task_manager|title }}
                    </span>
                </div>
            </div>
        </div>
        
        <div class="col-md-4">
            <div class="service-status-card">
                <div class="service-header">
                    <i class="fas fa-search mr-2"></i>
                    <span>Analyzer</span>
                </div>
                <div class="service-status">
                    <span class="badge badge-{{ 'success' if status.analyzer == 'available' else 'warning' }}">
                        {{ status.analyzer|title }}
                    </span>
                </div>
            </div>
        </div>
    </div>
</div>
