<!-- Dashboard System Status Partial -->
<div class="row g-3">
    {% for service_name, service_info in status_info.services.items() %}
        <div class="col-12">
            <div class="d-flex align-items-center p-2 border rounded">
                <div class="me-3">
                    <i class="{{ service_info.icon }} text-{{ service_info.color }} fa-lg"></i>
                </div>
                <div class="flex-grow-1">
                    <h6 class="mb-0">{{ service_name.title() }}</h6>
                    <small class="text-muted">{{ service_info.message }}</small>
                </div>
                <div>
                    <span class="badge bg-{{ service_info.color }}">
                        {{ service_info.status.title() }}
                    </span>
                </div>
            </div>
        </div>
    {% endfor %}
</div>

<div class="mt-3">
    <small class="text-muted">
        <i class="fas fa-clock me-1"></i>
        Last updated: {{ status_info.timestamp.strftime('%H:%M:%S') if status_info.timestamp else 'Unknown' }}
    </small>
</div>

<div class="mt-3 d-grid">
    <button class="btn btn-sm btn-outline-secondary" onclick="refreshSystemStatus()">
        <i class="fas fa-sync-alt me-1"></i>Refresh Status
    </button>
</div>

<script>
function refreshSystemStatus() {
    htmx.trigger('#system-status', 'refresh');
}
</script>
