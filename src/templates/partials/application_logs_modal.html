<!-- Application Logs Modal -->
<div class="modal fade" id="logsModal" tabindex="-1" aria-labelledby="logsModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="logsModalLabel">
                    <i class="fas fa-file-alt me-2"></i>
                    Application Logs - {{ app.model_slug }} #{{ app.app_number }}
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div>
                        <small class="text-muted">
                            Status: <span class="badge bg-{{ app.status_class }}">{{ app.container_status.title() }}</span>
                        </small>
                    </div>
                    <div class="btn-group btn-group-sm">
                        <button class="btn btn-outline-secondary" onclick="refreshLogs({{ app.id }})">
                            <i class="fas fa-sync-alt"></i> Refresh
                        </button>
                        <button class="btn btn-outline-secondary" onclick="downloadLogs({{ app.id }})">
                            <i class="fas fa-download"></i> Download
                        </button>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-body p-0">
                        <div id="logs-container" class="bg-dark text-light p-3" style="height: 400px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 0.875rem;">
                            {% if logs %}
                                {% for log in logs %}
                                <div class="log-entry mb-1">
                                    <span class="text-muted">[{{ log.timestamp }}]</span>
                                    <span class="badge badge-sm 
                                        {% if log.level == 'ERROR' %}bg-danger
                                        {% elif log.level == 'WARNING' %}bg-warning
                                        {% elif log.level == 'INFO' %}bg-info
                                        {% else %}bg-secondary{% endif %}">
                                        {{ log.level }}
                                    </span>
                                    <span class="text-light">{{ log.message }}</span>
                                </div>
                                {% endfor %}
                            {% else %}
                                <div class="text-center text-muted">
                                    <i class="fas fa-file-alt fa-3x mb-3"></i>
                                    <p>No logs available for this application.</p>
                                </div>
                            {% endif %}
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary" onclick="clearLogs({{ app.id }})">
                    <i class="fas fa-trash"></i> Clear Logs
                </button>
            </div>
        </div>
    </div>
</div>

<script>
function refreshLogs(appId) {
    // Auto-scroll to bottom after refresh
    const container = document.getElementById('logs-container');
    if (container) {
        container.scrollTop = container.scrollHeight;
    }
    
    // In production, this would make an AJAX call to refresh logs
    console.log('Refreshing logs for app:', appId);
}

function downloadLogs(appId) {
    // Create a downloadable log file
    const logs = document.getElementById('logs-container').innerText;
    const blob = new Blob([logs], { type: 'text/plain' });
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `app_${appId}_logs.txt`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    window.URL.revokeObjectURL(url);
}

function clearLogs(appId) {
    if (confirm('Are you sure you want to clear all logs for this application?')) {
        // In production, this would make an API call to clear logs
        document.getElementById('logs-container').innerHTML = 
            '<div class="text-center text-muted"><p>Logs cleared successfully.</p></div>';
    }
}

// Auto-scroll to bottom when modal opens
document.addEventListener('DOMContentLoaded', function() {
    const modal = document.getElementById('logsModal');
    if (modal) {
        modal.addEventListener('shown.bs.modal', function() {
            const container = document.getElementById('logs-container');
            if (container) {
                container.scrollTop = container.scrollHeight;
            }
        });
    }
});
</script>
