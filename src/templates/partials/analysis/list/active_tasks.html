<div class="legacy-active-tasks">
  {% set items = active or tasks %}
  {% if items %}
    <ul class="list-unstyled small mb-0">
      {% for t in items %}
        <li>
          <span class="badge bg-secondary me-1">{{ t.analysis_type or t.type or 'task' }}</span>
          {{ t.status or 'pending' }}
          {% if t.task_id or t.id %}<code>{{ t.task_id or t.id }}</code>{% endif %}
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <div class="text-muted small">No active tasks.</div>
  {% endif %}
</div>
