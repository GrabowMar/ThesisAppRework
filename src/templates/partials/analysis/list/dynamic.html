{# AdminLTE (dist) integration note #}
{% from 'partials/analysis/list/_row_macros.html' import dynamic_row %}

<div class="card">
  <div class="card-header"><i class="fas fa-bolt me-1"></i> Dynamic analyses</div>
  <div class="table-responsive">
    <table class="table table-sm align-middle mb-0">
      <thead>
        <tr>
          <th>ID</th>
          <th>App</th>
          <th>Status</th>
          <th>Scan</th>
          <th>Started</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        {% for a in items %}
          {{ dynamic_row(a) }}
        {% else %}
          <tr><td colspan="6" class="text-muted">No items</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
