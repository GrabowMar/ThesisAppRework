{% set _ = models %}
<form id="performanceTestForm" hx-boost="false" hx-post="{{ url_for('analysis.start_performance_test') }}" 
      hx-target="#operation-status" hx-swap="outerHTML" hx-indicator="#global-spinner">
  <div class="mb-3">
    <label for="perf_model_select" class="form-label">Model</label>
    <select class="form-select" id="perf_model_select" name="model_slug" required
            hx-get="{{ url_for('analysis.get_model_apps') }}"
            hx-target="#perf_app_select"
            hx-trigger="change"
            hx-include="#perf_model_select"
            hx-params="*"
            hx-on="htmx:config-request: event.detail.parameters.model_slug = this.value; event.detail.parameters.select_id = 'perf_app_select'">
      <option value="" selected disabled>Choose a model…</option>
      {% for m in models %}
        <option value="{{ m.canonical_slug or m.slug or m.model_slug }}">{{ m.display_name or m.model_name or m.canonical_slug }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="mb-3">
    <label for="perf_app_select" class="form-label">Application</label>
    <select class="form-select" id="perf_app_select" name="app_number" required>
      <option value="" selected disabled>Select a model first…</option>
    </select>
  </div>

  <div class="row g-3 mb-3">
    <div class="col-sm-4">
      <label class="form-label" for="perf_users">Users</label>
      <input type="number" class="form-control" id="perf_users" name="users" value="10" min="1">
    </div>
    <div class="col-sm-4">
      <label class="form-label" for="perf_spawn_rate">Spawn rate</label>
      <input type="number" class="form-control" id="perf_spawn_rate" name="spawn_rate" value="1.0" step="0.1" min="0.1">
    </div>
    <div class="col-sm-4">
      <label class="form-label" for="perf_duration">Duration (sec)</label>
      <input type="number" class="form-control" id="perf_duration" name="duration" value="60" min="1">
    </div>
  </div>

  <div class="mb-3">
    <label class="form-label" for="perf_type">Test type</label>
    <select class="form-select" id="perf_type" name="test_type">
      <option value="load" selected>Load</option>
      <option value="stress">Stress</option>
      <option value="soak">Soak</option>
    </select>
  </div>

  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-primary"><i class="fas fa-tachometer-alt me-2"></i>Start performance test</button>
    <button type="reset" class="btn btn-outline-secondary">Reset</button>
  </div>
</form>
