{% set _ = models %}
<form id="batchForm" hx-post="{{ url_for('analysis.start_batch_analysis') }}"
      hx-target="#operation-status" hx-swap="outerHTML" hx-indicator="#global-spinner">
  <div class="mb-3">
    <label class="form-label">Models</label>
    <select class="form-select" name="models" id="batch_models" multiple size="6" required>
      {% for m in models %}
        <option value="{{ m.canonical_slug or m.slug or m.model_slug }}">{{ m.display_name or m.model_name or m.canonical_slug }}</option>
      {% endfor %}
    </select>
    <div class="form-text">Choose one or more models. If no apps are specified below, all apps for those models will be included.</div>
  </div>

  <div class="mb-3">
    <label class="form-label">Application numbers</label>
    <input type="text" class="form-control" name="app_numbers" placeholder="e.g., 1,2,3">
    <div class="form-text">Optional: comma-separated list. You may also specify a range below.</div>
  </div>

  <div class="row g-3 mb-3">
    <div class="col-sm-6">
      <label class="form-label" for="app_range_start">Range start</label>
      <input class="form-control" id="app_range_start" name="app_range_start" type="number" min="1" placeholder="1">
    </div>
    <div class="col-sm-6">
      <label class="form-label" for="app_range_end">Range end</label>
      <input class="form-control" id="app_range_end" name="app_range_end" type="number" min="1" placeholder="10">
    </div>
  </div>

  <div class="mb-3">
    <label class="form-label">Analysis types</label>
    <div class="row row-cols-2 row-cols-md-3 g-2">
      <div class="form-check col"><input class="form-check-input" type="checkbox" name="analysis_types" value="security" id="atype_security" checked><label class="form-check-label" for="atype_security">Security</label></div>
      <div class="form-check col"><input class="form-check-input" type="checkbox" name="analysis_types" value="static" id="atype_static"><label class="form-check-label" for="atype_static">Static</label></div>
      <div class="form-check col"><input class="form-check-input" type="checkbox" name="analysis_types" value="performance" id="atype_performance"><label class="form-check-label" for="atype_performance">Performance</label></div>
      <div class="form-check col"><input class="form-check-input" type="checkbox" name="analysis_types" value="dynamic" id="atype_dynamic"><label class="form-check-label" for="atype_dynamic">Dynamic</label></div>
      <div class="form-check col"><input class="form-check-input" type="checkbox" name="analysis_types" value="ai" id="atype_ai"><label class="form-check-label" for="atype_ai">AI</label></div>
    </div>
  </div>

  <div class="mb-3">
    <label class="form-label" for="priority">Priority</label>
    <select class="form-select" id="priority" name="priority">
      <option value="low">Low</option>
      <option value="normal" selected>Normal</option>
      <option value="high">High</option>
    </select>
  </div>

  <fieldset class="border rounded p-3 mb-3">
    <legend class="float-none w-auto px-2 small text-muted">Options</legend>
    <div class="mb-2">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="continue_on_error" name="continue_on_error">
        <label class="form-check-label" for="continue_on_error">Continue on error</label>
      </div>
    </div>
    <div class="row g-3">
      <div class="col-md-4">
        <label class="form-label" for="parallelism">Parallelism</label>
        <input class="form-control" type="number" id="parallelism" name="parallelism" min="1" placeholder="Auto">
      </div>
      <div class="col-md-4">
        <label class="form-label" for="timeout_minutes">Timeout (min)</label>
        <input class="form-control" type="number" id="timeout_minutes" name="timeout_minutes" min="1" placeholder="60">
      </div>
    </div>

    <div class="mt-3">
      <label class="form-label">Security tools</label>
      <div class="row row-cols-2 row-cols-md-3 g-2">
        <div class="form-check col"><input class="form-check-input" type="checkbox" name="security_tools" value="bandit" id="sec_bandit"><label class="form-check-label" for="sec_bandit">Bandit</label></div>
        <div class="form-check col"><input class="form-check-input" type="checkbox" name="security_tools" value="pylint" id="sec_pylint"><label class="form-check-label" for="sec_pylint">Pylint</label></div>
        <div class="form-check col"><input class="form-check-input" type="checkbox" name="security_tools" value="eslint" id="sec_eslint"><label class="form-check-label" for="sec_eslint">ESLint</label></div>
      </div>
    </div>

    <div class="mt-3">
      <label class="form-label">Static tools</label>
      <div class="row row-cols-2 row-cols-md-3 g-2">
        <div class="form-check col"><input class="form-check-input" type="checkbox" name="static_tools" value="eslint" id="st_eslint"><label class="form-check-label" for="st_eslint">ESLint</label></div>
        <div class="form-check col"><input class="form-check-input" type="checkbox" name="static_tools" value="pylint" id="st_pylint"><label class="form-check-label" for="st_pylint">Pylint</label></div>
      </div>
    </div>

    <div class="mt-3">
      <label class="form-label">Performance config</label>
      <div class="row g-3">
        <div class="col-sm-4">
          <label class="form-label" for="perf_users">Users</label>
          <input type="number" class="form-control" id="perf_users" name="perf_users" min="1">
        </div>
        <div class="col-sm-4">
          <label class="form-label" for="perf_spawn_rate">Spawn rate</label>
          <input type="number" class="form-control" id="perf_spawn_rate" step="0.1" name="perf_spawn_rate" min="0.1">
        </div>
        <div class="col-sm-4">
          <label class="form-label" for="perf_duration">Duration (sec)</label>
          <input type="number" class="form-control" id="perf_duration" name="perf_duration" min="1">
        </div>
        <div class="col-12">
          <label class="form-label" for="perf_type">Test type</label>
          <select class="form-select" id="perf_type" name="perf_type">
            <option value="load" selected>Load</option>
            <option value="stress">Stress</option>
            <option value="soak">Soak</option>
          </select>
        </div>
      </div>
    </div>

    <div class="mt-3">
      <label class="form-label" for="dynamic_scan_type">Dynamic scan type</label>
      <select class="form-select" id="dynamic_scan_type" name="dynamic_scan_type">
        <option value="baseline" selected>Baseline</option>
        <option value="full">Full</option>
      </select>
    </div>
  </fieldset>

  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-primary"><i class="fas fa-layer-group me-2"></i>Start batch</button>
    <button type="reset" class="btn btn-outline-secondary">Reset</button>
  </div>
</form>
