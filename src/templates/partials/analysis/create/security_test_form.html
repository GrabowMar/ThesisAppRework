{% set _ = models %}
<form id="securityTestForm" hx-boost="false" hx-post="{{ url_for('analysis.start_security_analysis') }}" 
      hx-target="#operation-status" hx-swap="outerHTML" hx-indicator="#global-spinner">
  <div class="mb-3">
    <label for="security_model_select" class="form-label">Model</label>
    <select class="form-select" id="security_model_select" name="model_slug" required
            hx-get="{{ url_for('analysis.get_model_apps') }}"
            hx-target="#security_app_select"
            hx-trigger="change"
            hx-include="#security_model_select"
            hx-params="*"
            hx-on="htmx:config-request: event.detail.parameters.model_slug = this.value; event.detail.parameters.select_id = 'security_app_select'">
      <option value="" selected disabled>Choose a model…</option>
      {% for m in models %}
        <option value="{{ m.canonical_slug or m.slug or m.model_slug }}">{{ m.display_name or m.model_name or m.canonical_slug }}</option>
      {% endfor %}
    </select>
    <div class="form-text">Select the AI model to analyze</div>
  </div>

  <div class="mb-3">
    <label for="security_app_select" class="form-label">Application</label>
    <select class="form-select" id="security_app_select" name="app_number" required>
      <option value="" selected disabled>Select a model first…</option>
    </select>
  </div>

  <div class="mb-3">
    <label class="form-label">Tools</label>
    <div class="row row-cols-2 row-cols-md-3 g-2">
      <div class="form-check col"><input class="form-check-input" type="checkbox" name="bandit_enabled" id="tool_bandit" checked><label class="form-check-label" for="tool_bandit">Bandit</label></div>
      <div class="form-check col"><input class="form-check-input" type="checkbox" name="pylint_enabled" id="tool_pylint" checked><label class="form-check-label" for="tool_pylint">Pylint</label></div>
      <div class="form-check col"><input class="form-check-input" type="checkbox" name="eslint_enabled" id="tool_eslint" checked><label class="form-check-label" for="tool_eslint">ESLint</label></div>
      <div class="form-check col"><input class="form-check-input" type="checkbox" name="npm_audit_enabled" id="tool_npmaudit"><label class="form-check-label" for="tool_npmaudit">npm audit</label></div>
      <div class="form-check col"><input class="form-check-input" type="checkbox" name="snyk_enabled" id="tool_snyk"><label class="form-check-label" for="tool_snyk">Snyk</label></div>
      <div class="form-check col"><input class="form-check-input" type="checkbox" name="zap_enabled" id="tool_zap"><label class="form-check-label" for="tool_zap">ZAP</label></div>
    </div>
  </div>

  <div class="mb-3">
    <label for="severity_threshold" class="form-label">Severity threshold</label>
    <select class="form-select" id="severity_threshold" name="severity_threshold">
      <option value="low">Low</option>
      <option value="medium" selected>Medium</option>
      <option value="high">High</option>
      <option value="critical">Critical</option>
    </select>
  </div>

  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-primary"><i class="fas fa-shield-alt me-2"></i>Start security analysis</button>
    <button type="reset" class="btn btn-outline-secondary">Reset</button>
  </div>
</form>
