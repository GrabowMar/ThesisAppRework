<div class="card">
  <div class="card-header d-flex align-items-center justify-content-between">
    <h6 class="mb-0"><i class="fas fa-file-lines me-2"></i>Logs</h6>
    <div class="d-flex align-items-center gap-2">
      <form class="d-flex align-items-center gap-2" hx-get="" hx-target="#section-logs" hx-swap="outerHTML">
        <label class="form-label mb-0 small text-muted">Source</label>
        <select name="source" class="form-select form-select-sm" onchange="this.form.action=window.location.pathname; this.form.submit();">
          {% for src in log_sources %}
            <option value="{{ src.path }}" {{ 'selected' if active_source==src.path }}>{{ src.name }}</option>
          {% endfor %}
        </select>
      </form>
    </div>
  </div>
  <div class="card-body">
    {% if active_source %}
      <div class="small text-muted mb-2">Showing tail of: <code>{{ active_source }}</code>{% if truncated %} (truncated){% endif %}</div>
    {% else %}
      <div class="alert alert-secondary">No log sources found.</div>
    {% endif %}
    <pre class="bg-body-tertiary rounded p-2" style="max-height: 420px; overflow:auto; white-space: pre-wrap">{{ content }}</pre>
  </div>
</div>
