<div class="text-center p-5">
    <div class="mb-3">
        <i class="fas fa-{{ icon|default('inbox') }} fa-3x text-muted"></i>
    </div>
    <h5 class="text-muted">{{ title|default('No Data Available') }}</h5>
    <p class="text-muted mb-3">{{ message|default('There are no items to display at this time.') }}</p>
    {% if action_text and action_url %}
        <a href="{{ action_url }}" class="btn btn-primary">
            <i class="fas fa-plus me-1"></i>{{ action_text }}
        </a>
    {% endif %}
</div>
