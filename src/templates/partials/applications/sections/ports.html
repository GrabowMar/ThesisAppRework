<div class="card">
  <div class="card-header d-flex justify-content-between align-items-center">
    <h6 class="card-title mb-0"><i class="fas fa-network-wired me-2"></i>Port Configuration</h6>
    {% if app_data.container_status == 'running' %}<span class="badge bg-success">Running</span>{% endif %}
  </div>
  <div class="card-body">
    {% if ports %}
    <dl class="row mb-0">
      {% if ports.frontend %}
      <dt class="col-sm-3">Frontend</dt>
      <dd class="col-sm-9">
        <code>{{ ports.frontend }}</code>
        <a class="btn btn-sm btn-outline-primary ms-2" href="http://localhost:{{ ports.frontend }}" target="_blank">
          <i class="fas fa-external-link-alt me-1"></i>Open
        </a>
      </dd>
      {% endif %}
      {% if ports.backend %}
      <dt class="col-sm-3">Backend</dt>
      <dd class="col-sm-9">
        <code>{{ ports.backend }}</code>
        <a class="btn btn-sm btn-outline-secondary ms-2" href="http://localhost:{{ ports.backend }}" target="_blank">
          <i class="fas fa-external-link-alt me-1"></i>API
        </a>
      </dd>
      {% endif %}
    </dl>
    {% else %}
    <p class="text-muted mb-0">No port configuration available.</p>
    {% endif %}
  </div>
</div>
