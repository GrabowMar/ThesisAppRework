<div class="card">
  <div class="card-header d-flex align-items-center justify-content-between">
    <h6 class="mb-0"><i class="fas fa-network-wired me-2"></i>Ports</h6>
    {% if ports %}
    <span class="badge bg-success">Assigned</span>
    {% else %}
    <span class="badge bg-secondary">Not assigned</span>
    {% endif %}
  </div>
  <div class="card-body">
    <div class="row g-3">
      <div class="col-md-6">
        <div class="p-2 bg-body-tertiary rounded">
          <div class="text-muted small">Backend</div>
          <div class="fs-5">{{ ports.backend if ports else '—' }}</div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="p-2 bg-body-tertiary rounded">
          <div class="text-muted small">Frontend</div>
          <div class="fs-5">{{ ports.frontend if ports else '—' }}</div>
        </div>
      </div>
    </div>
    <div class="mt-3 text-muted small">Ports are retrieved from PortConfiguration in the database.</div>
  </div>
</div>
