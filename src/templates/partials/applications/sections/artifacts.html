<div class="card">
  <div class="card-header">
    <h6 class="mb-0"><i class="fas fa-book me-2"></i>Artifacts</h6>
  </div>
  <div class="card-body">
    <ul class="list-unstyled mb-0">
      <li>
        <i class="fas fa-file me-1 text-muted"></i>
        PROJECT_INDEX.md: 
        {% if artifacts.project_index %}
          <a href="/models/application/{{ app_data.model_slug }}/{{ app_data.app_number }}/file?path=PROJECT_INDEX.md" hx-target="#file-preview" hx-swap="innerHTML">Open</a>
        {% else %}
          <span class="text-muted">—</span>
        {% endif %}
      </li>
      <li>
        <i class="fas fa-file me-1 text-muted"></i>
        README.md: 
        {% if artifacts.readme %}
          <a href="/models/application/{{ app_data.model_slug }}/{{ app_data.app_number }}/file?path=README.md" hx-target="#file-preview" hx-swap="innerHTML">Open</a>
        {% else %}
          <span class="text-muted">—</span>
        {% endif %}
      </li>
      <li>
        <i class="fas fa-file me-1 text-muted"></i>
        docker-compose.yml: 
        {% if artifacts.compose_path %}
          <a href="/models/application/{{ app_data.model_slug }}/{{ app_data.app_number }}/file?path=docker-compose.yml" hx-target="#file-preview" hx-swap="innerHTML">Open</a>
        {% else %}
          <span class="text-muted">—</span>
        {% endif %}
      </li>
    </ul>
    <div id="file-preview" class="mt-3"></div>
  </div>
</div>
