<div class="card mb-3">
  <div class="card-header d-flex justify-content-between align-items-center">
    <h6 class="card-title mb-0"><i class="fas fa-lightbulb me-2"></i>Backend Prompt</h6>
    <button class="btn btn-sm btn-outline-secondary" onclick="copyAdjacentPre(this)"><i class="fas fa-copy me-1"></i>Copy</button>
  </div>
  <div class="card-body p-0">
    <pre class="m-0 p-3 font-mono-sm" style="white-space: pre-wrap;">{{ prompts.backend or 'No backend prompt found for app ' ~ app_data.app_number }}</pre>
  </div>
</div>

<div class="card">
  <div class="card-header d-flex justify-content-between align-items-center">
    <h6 class="card-title mb-0"><i class="fas fa-lightbulb me-2"></i>Frontend Prompt</h6>
    <button class="btn btn-sm btn-outline-secondary" onclick="copyAdjacentPre(this)"><i class="fas fa-copy me-1"></i>Copy</button>
  </div>
  <div class="card-body p-0">
    <pre class="m-0 p-3 font-mono-sm" style="white-space: pre-wrap;">{{ prompts.frontend or 'No frontend prompt found for app ' ~ app_data.app_number }}</pre>
  </div>
</div>
