<div class="card">
  <div class="card-header d-flex align-items-center justify-content-between">
    <h6 class="mb-0"><i class="fas fa-lightbulb me-2"></i>Prompts</h6>
    <div class="text-muted small">Templates dir: {{ templates_dir or 'misc/app_templates' }}</div>
  </div>
  <div class="card-body">
    <div class="row g-3">
      <div class="col-md-6">
        <div class="mb-3">
          <div class="d-flex justify-content-between align-items-center mb-1">
            <label class="form-label mb-0">Backend Prompt</label>
            {% if template_files.backend_file %}
            <span class="badge bg-secondary">{{ template_files.backend_file }}</span>
            {% endif %}
          </div>
          <pre class="bg-body-tertiary rounded p-2" style="max-height: 320px; overflow:auto; white-space: pre-wrap">{{ prompts.backend or '—' }}</pre>
          <button class="btn btn-sm btn-outline-secondary" onclick="copyAdjacentPre(this)"><i class="fas fa-copy me-1"></i>Copy</button>
        </div>
      </div>
      <div class="col-md-6">
        <div class="mb-3">
          <div class="d-flex justify-content-between align-items-center mb-1">
            <label class="form-label mb-0">Frontend Prompt</label>
            {% if template_files.frontend_file %}
            <span class="badge bg-secondary">{{ template_files.frontend_file }}</span>
            {% endif %}
          </div>
          <pre class="bg-body-tertiary rounded p-2" style="max-height: 320px; overflow:auto; white-space: pre-wrap">{{ prompts.frontend or '—' }}</pre>
          <button class="btn btn-sm btn-outline-secondary" onclick="copyAdjacentPre(this)"><i class="fas fa-copy me-1"></i>Copy</button>
        </div>
      </div>
    </div>
  </div>
</div>
