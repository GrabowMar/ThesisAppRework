<div class="card">
  <div class="card-header">
    <h6 class="mb-0"><i class="fas fa-database me-2"></i>Metadata</h6>
  </div>
  <div class="card-body">
    {% if app_data.metadata %}
    <div class="table-responsive">
      <table class="table table-sm">
        <thead>
          <tr><th>Key</th><th>Value</th></tr>
        </thead>
        <tbody>
          {% for k, v in app_data.metadata.items() %}
          <tr>
            <td class="text-muted small">{{ k }}</td>
            <td><code class="small">{{ v }}</code></td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
    {% else %}
      <div class="text-muted">No metadata available.</div>
    {% endif %}
  </div>
</div>
