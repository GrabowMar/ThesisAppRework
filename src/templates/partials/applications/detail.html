{# Application detail partial (simplified) #}
<div class="card mb-3"><div class="card-header"><h3 class="card-title mb-0"><i class="fas fa-cube mr-1"></i> Application {{ app_data.app_number }} ({{ app_data.model_slug }})</h3></div><div class="card-body">
  <dl class="row mb-0">
    <dt class="col-sm-3">Exists</dt><dd class="col-sm-9">{{ 'Yes' if app_data.exists_in_db else 'No' }}</dd>
    <dt class="col-sm-3">Status</dt><dd class="col-sm-9">{{ app_data.container_status }}</dd>
    <dt class="col-sm-3">Type</dt><dd class="col-sm-9">{{ app_data.app_type }}</dd>
    <dt class="col-sm-3">Generation</dt><dd class="col-sm-9">{{ app_data.generation_status }}</dd>
  </dl>
</div></div>
