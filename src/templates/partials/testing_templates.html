<!-- Testing Templates Partial -->
{% if templates %}
    <div class="row">
        {% for template in templates %}
        <div class="col-md-4 mb-3">
            <div class="card">
                <div class="card-body">
                    <h6 class="card-title">{{ template.name }}</h6>
                    <p class="card-text">
                        <small class="text-muted">{{ template.filename }}</small>
                    </p>
                    <div class="btn-group btn-group-sm w-100" role="group">
                        <button class="btn btn-outline-primary" onclick="viewTemplate('{{ template.filename }}')">
                            View
                        </button>
                        <button class="btn btn-outline-success" onclick="useTemplate('{{ template.filename }}')">
                            Use
                        </button>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
{% else %}
    <div class="text-center py-4">
        <i class="fas fa-file-code fa-3x text-muted mb-3"></i>
        <h5 class="text-muted">No templates found</h5>
        <p class="text-muted">No testing templates are currently available.</p>
    </div>
{% endif %}
