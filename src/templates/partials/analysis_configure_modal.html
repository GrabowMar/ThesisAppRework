{# AdminLTE (dist) integration note #}
<!-- Analysis Configuration Modal -->
<div class="modal fade" id="analysisModal" tabindex="-1" aria-labelledby="analysisModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="analysisModalLabel">
                    <i class="fas fa-search me-2"></i>
                    Configure Analysis - {{ app.model_slug }} #{{ app.app_number }}
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="analysisForm">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="card">
                                <div class="card-header">
                                    <h6 class="mb-0">
                                        <i class="fas fa-shield-alt text-danger me-2"></i>
                                        Security Analysis
                                    </h6>
                                </div>
                                <div class="card-body">
                                    <div class="form-check mb-2">
                                        <input class="form-check-input" type="checkbox" id="securityEnabled" checked>
                                        <label class="form-check-label" for="securityEnabled">
                                            Enable Security Analysis
                                        </label>
                                    </div>
                                    <div class="form-check mb-2">
                                        <input class="form-check-input" type="checkbox" id="banditEnabled" checked>
                                        <label class="form-check-label" for="banditEnabled">
                                            Bandit Static Analysis
                                        </label>
                                    </div>
                                    <div class="form-check mb-2">
                                        <input class="form-check-input" type="checkbox" id="semgrepEnabled" checked>
                                        <label class="form-check-label" for="semgrepEnabled">
                                            Semgrep Code Scanning
                                        </label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="zapEnabled">
                                        <label class="form-check-label" for="zapEnabled">
                                            OWASP ZAP Dynamic Scan
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="col-md-6">
                            <div class="card">
                                <div class="card-header">
                                    <h6 class="mb-0">
                                        <i class="fas fa-tachometer-alt text-success me-2"></i>
                                        Performance Testing
                                    </h6>
                                </div>
                                <div class="card-body">
                                    <div class="form-check mb-2">
                                        <input class="form-check-input" type="checkbox" id="performanceEnabled" checked>
                                        <label class="form-check-label" for="performanceEnabled">
                                            Enable Performance Testing
                                        </label>
                                    </div>
                                    <div class="form-check mb-2">
                                        <input class="form-check-input" type="checkbox" id="locustEnabled" checked>
                                        <label class="form-check-label" for="locustEnabled">
                                            Locust Load Testing
                                        </label>
                                    </div>
                                    <div class="form-check mb-2">
                                        <input class="form-check-input" type="checkbox" id="artilleryEnabled">
                                        <label class="form-check-label" for="artilleryEnabled">
                                            Artillery.io Testing
                                        </label>
                                    </div>
                                    <div class="row mt-3">
                                        <div class="col-6">
                                            <label for="testDuration" class="form-label">Duration (seconds)</label>
                                            <input type="number" class="form-control" id="testDuration" value="60" min="10" max="3600">
                                        </div>
                                        <div class="col-6">
                                            <label for="userCount" class="form-label">Virtual Users</label>
                                            <input type="number" class="form-control" id="userCount" value="10" min="1" max="100">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="row mt-3">
                        <div class="col-md-6">
                            <div class="card">
                                <div class="card-header">
                                    <h6 class="mb-0">
                                        <i class="fas fa-robot text-info me-2"></i>
                                        AI Analysis
                                    </h6>
                                </div>
                                <div class="card-body">
                                    <div class="form-check mb-2">
                                        <input class="form-check-input" type="checkbox" id="aiEnabled">
                                        <label class="form-check-label" for="aiEnabled">
                                            Enable AI Code Analysis
                                        </label>
                                    </div>
                                    <div class="form-check mb-2">
                                        <input class="form-check-input" type="checkbox" id="codeReviewEnabled">
                                        <label class="form-check-label" for="codeReviewEnabled">
                                            AI Code Review
                                        </label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="architectureAnalysisEnabled">
                                        <label class="form-check-label" for="architectureAnalysisEnabled">
                                            Architecture Analysis
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="col-md-6">
                            <div class="card">
                                <div class="card-header">
                                    <h6 class="mb-0">
                                        <i class="fas fa-cogs text-warning me-2"></i>
                                        Analysis Options
                                    </h6>
                                </div>
                                <div class="card-body">
                                    <div class="mb-3">
                                        <label for="analysisProfile" class="form-label">Analysis Profile</label>
                                        <select class="form-select" id="analysisProfile">
                                            <option value="quick">Quick Scan (Fast)</option>
                                            <option value="standard" selected>Standard Scan (Balanced)</option>
                                            <option value="comprehensive">Comprehensive Scan (Thorough)</option>
                                        </select>
                                    </div>
                                    <div class="form-check mb-2">
                                        <input class="form-check-input" type="checkbox" id="generateReport" checked>
                                        <label class="form-check-label" for="generateReport">
                                            Generate Detailed Report
                                        </label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="emailNotification">
                                        <label class="form-check-label" for="emailNotification">
                                            Email Notification on Completion
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="startAnalysis({{ app.id }})">
                    <i class="fas fa-play me-1"></i>Start Analysis
                </button>
            </div>
        </div>
    </div>
</div>

<script>
function startAnalysis(appId) {
    // Collect form data
    const config = {
        security: {
            enabled: document.getElementById('securityEnabled').checked,
            bandit: document.getElementById('banditEnabled').checked,
            semgrep: document.getElementById('semgrepEnabled').checked,
            zap: document.getElementById('zapEnabled').checked
        },
        performance: {
            enabled: document.getElementById('performanceEnabled').checked,
            locust: document.getElementById('locustEnabled').checked,
            artillery: document.getElementById('artilleryEnabled').checked,
            duration: parseInt(document.getElementById('testDuration').value),
            users: parseInt(document.getElementById('userCount').value)
        },
        ai: {
            enabled: document.getElementById('aiEnabled').checked,
            code_review: document.getElementById('codeReviewEnabled').checked,
            architecture: document.getElementById('architectureAnalysisEnabled').checked
        },
        options: {
            profile: document.getElementById('analysisProfile').value,
            generate_report: document.getElementById('generateReport').checked,
            email_notification: document.getElementById('emailNotification').checked
        }
    };
    
    // Show loading state
    const button = event.target;
    const originalText = button.innerHTML;
    button.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i>Starting...';
    button.disabled = true;
    
    // Start analysis
    fetch(`/api/analysis/start/${appId}`, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(config)
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            // Close modal
            const modal = bootstrap.Modal.getInstance(document.getElementById('analysisModal'));
            modal.hide();
            
            // Show success message
            alert('Analysis started successfully! You can monitor progress in the dashboard.');
            
            // Refresh the page to show updated status
            location.reload();
        } else {
            alert('Error starting analysis: ' + data.error);
        }
    })
    .catch(error => {
        alert('Error starting analysis: ' + error);
    })
    .finally(() => {
        // Restore button state
        button.innerHTML = originalText;
        button.disabled = false;
    });
}

// Enable/disable related checkboxes based on main toggles
document.addEventListener('DOMContentLoaded', function() {
    const securityToggle = document.getElementById('securityEnabled');
    const performanceToggle = document.getElementById('performanceEnabled');
    const aiToggle = document.getElementById('aiEnabled');
    
    function toggleSecurityOptions() {
        const enabled = securityToggle.checked;
        document.getElementById('banditEnabled').disabled = !enabled;
        document.getElementById('semgrepEnabled').disabled = !enabled;
        document.getElementById('zapEnabled').disabled = !enabled;
    }
    
    function togglePerformanceOptions() {
        const enabled = performanceToggle.checked;
        document.getElementById('locustEnabled').disabled = !enabled;
        document.getElementById('artilleryEnabled').disabled = !enabled;
        document.getElementById('testDuration').disabled = !enabled;
        document.getElementById('userCount').disabled = !enabled;
    }
    
    function toggleAiOptions() {
        const enabled = aiToggle.checked;
        document.getElementById('codeReviewEnabled').disabled = !enabled;
        document.getElementById('architectureAnalysisEnabled').disabled = !enabled;
    }
    
    securityToggle.addEventListener('change', toggleSecurityOptions);
    performanceToggle.addEventListener('change', togglePerformanceOptions);
    aiToggle.addEventListener('change', toggleAiOptions);
    
    // Initialize states
    toggleSecurityOptions();
    togglePerformanceOptions();
    toggleAiOptions();
});
</script>
