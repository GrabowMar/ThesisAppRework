<nav aria-label="breadcrumb" class="{{ wrapper_class|default('') }}">
    <ol class="breadcrumb {{ class|default('') }}">
        {% for item in items %}
            {% if loop.last %}
                <li class="breadcrumb-item active" aria-current="page">
                    {% if item.icon %}
                        <i class="fas {{ item.icon }} me-1"></i>
                    {% endif %}
                    {{ item.text }}
                </li>
            {% else %}
                <li class="breadcrumb-item">
                    {% if item.url %}
                        <a href="{{ item.url }}" class="{{ item.class|default('') }}">
                            {% if item.icon %}
                                <i class="fas {{ item.icon }} me-1"></i>
                            {% endif %}
                            {{ item.text }}
                        </a>
                    {% else %}
                        {% if item.icon %}
                            <i class="fas {{ item.icon }} me-1"></i>
                        {% endif %}
                        {{ item.text }}
                    {% endif %}
                </li>
            {% endif %}
        {% endfor %}
    </ol>
</nav>
