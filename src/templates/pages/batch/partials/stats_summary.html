<div class="row text-center">

    <h5 class="mb-0">{{ stats.total_batches }}</h5>
    <small class="text-muted">Total</small>
  </div>
  <div class="col-6 col-md-2 mb-3 mb-md-0">
    <h5 class="mb-0">{{ stats.running_batches }}</h5>
    <small class="text-muted">Running</small>
  </div>
  <div class="col-6 col-md-2 mb-3 mb-md-0">
    <h5 class="mb-0">{{ stats.queued_batches }}</h5>

  </div>
  <div class="col-6 col-md-2 mb-3 mb-md-0">
    <h5 class="mb-0">{{ stats.completed_batches }}</h5>
    <small class="text-muted">Completed</small>
  </div>
  <div class="col-6 col-md-2 mb-3 mb-md-0">
    <h5 class="mb-0">{{ stats.total_analyses }}</h5>
    <small class="text-muted">Analyses</small>

  <div class="col-6 col-md-2 mb-0">
