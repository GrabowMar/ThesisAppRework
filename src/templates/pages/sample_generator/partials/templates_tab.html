<div class="row">
  <div class="col-lg-4">
    <div class="card">
      <div class="card-header"><h4 class="card-title">Templates</h4></div>
      <div class="card-body">
        <div class="d-grid gap-2 mb-3">
          <button class="btn btn-sm btn-outline-primary" id="btn-refresh-templates">Refresh</button>
          <button class="btn btn-sm btn-outline-success" id="btn-new-template">New Template</button>
          <button class="btn btn-sm btn-outline-secondary" id="btn-load-profiles">Profiles</button>
        </div>
        <div class="small text-muted mb-2">Manage code & app templates. Click a row to edit.</div>
        <div class="border rounded p-2" style="font-family:monospace; font-size:0.75rem; max-height:50vh; overflow:auto;" id="template-list">
          <div class="text-muted">Loading...</div>
        </div>
      </div>
    </div>
  </div>
  <div class="col-lg-8">
    <div class="card">
      <div class="card-header"><h4 class="card-title">Editor</h4></div>
      <div class="card-body">
        <div class="mb-2">
          <span class="badge bg-info" id="template-category-badge"></span>
          <code id="template-path-display"></code>
          <span class="small text-muted ms-2" id="template-placeholders"></span>
        </div>
        <textarea id="template-editor-text" class="form-control" style="min-height:55vh; font-family:monospace; font-size:0.8rem;" placeholder="Select or create a template to begin editing..."></textarea>
        <div class="mt-2 d-flex gap-2">
          <button class="btn btn-sm btn-primary" id="btn-save-template" disabled>Save</button>
          <button class="btn btn-sm btn-outline-danger" id="btn-delete-template" disabled>Delete</button>
          <div class="ms-auto small text-muted" id="template-status"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const listEl = document.getElementById('template-list');
  const refreshBtn = document.getElementById('btn-refresh-templates');
  const newBtn = document.getElementById('btn-new-template');
  const saveBtn = document.getElementById('btn-save-template');
  const deleteBtn = document.getElementById('btn-delete-template');
  const editor = document.getElementById('template-editor-text');
  const categoryBadge = document.getElementById('template-category-badge');
  const pathDisplay = document.getElementById('template-path-display');
  const placeholdersDisplay = document.getElementById('template-placeholders');
  const statusEl = document.getElementById('template-status');

  let currentCategory = null;
  let currentPath = null;
  let originalContent = '';
  let dirty = false;

  function setStatus(msg, cls='text-muted'){ statusEl.className = 'small ' + cls; statusEl.textContent = msg; }
  function markDirty(){ if(currentCategory){ dirty = true; saveBtn.disabled = false; setStatus('Unsaved changes','text-warning'); } }
  editor.addEventListener('input', markDirty);

  function renderList(items){
    if(!items.length){ listEl.innerHTML = '<div class="text-muted">No templates found.</div>'; return; }
    const rows = items.sort((a,b)=>a.category.localeCompare(b.category) || a.relative_path.localeCompare(b.relative_path))
      .map(m => `<div class='d-flex justify-content-between align-items-center border-bottom py-1 template-row' style='cursor:pointer' data-cat='${m.category}' data-path='${m.relative_path}'>
        <div><span class='badge bg-secondary me-1'>${m.category}</span><code>${m.relative_path}</code></div>
        <div class='text-muted small'>v${m.versions} ${(m.size/1024).toFixed(1)} KB</div>
      </div>`).join('');
    listEl.innerHTML = rows;
    listEl.querySelectorAll('.template-row').forEach(row => {
      row.addEventListener('click', () => loadTemplate(row.dataset.cat, row.dataset.path));
    });
  }

  async function fetchList(){
    listEl.innerHTML = '<div class="text-muted">Loading...</div>';
    try {
      const res = await fetch('/api/templates/');
      const data = await res.json();
      renderList(data.items || []);
    } catch(e){ listEl.innerHTML = '<div class="text-danger">Failed to load list</div>'; }
  }

  async function loadTemplate(category, rel){
    if(dirty && !confirm('Discard unsaved changes?')) return;
    setStatus('Loading...');
    try {
      const res = await fetch(`/api/templates/${category}/${rel}`);
      if(!res.ok) throw new Error();
      const data = await res.json();
      currentCategory = category; currentPath = rel; dirty = false;
      editor.value = data.content || ''; originalContent = editor.value;
      categoryBadge.textContent = category; pathDisplay.textContent = rel;
      placeholdersDisplay.textContent = 'Placeholders: ' + (data.placeholders?.join(', ') || 'none');
      saveBtn.disabled = true; deleteBtn.disabled = false;
      setStatus('Loaded','text-success');
    } catch(e){ setStatus('Failed to load','text-danger'); }
  }

  saveBtn.addEventListener('click', async () => {
    if(!currentCategory || !currentPath) return;
    setStatus('Saving...');
    try {
      const res = await fetch(`/api/templates/${currentCategory}/${currentPath}`, {
        method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({content: editor.value})
      });
      if(!res.ok) throw new Error();
      dirty = false; originalContent = editor.value; saveBtn.disabled = true;
      setStatus('Saved','text-success');
      fetchList();
    } catch(e){ setStatus('Save failed','text-danger'); }
  });

  deleteBtn.addEventListener('click', async () => {
    if(!currentCategory || !currentPath) return;
    if(!confirm('Delete this template?')) return;
    setStatus('Deleting...');
    try {
      const res = await fetch(`/api/templates/${currentCategory}/${currentPath}`, { method:'DELETE' });
      if(!res.ok) throw new Error();
      editor.value=''; currentCategory=null; currentPath=null; placeholdersDisplay.textContent='';
      deleteBtn.disabled = true; saveBtn.disabled = true; setStatus('Deleted','text-success');
      fetchList();
    } catch(e){ setStatus('Delete failed','text-danger'); }
  });

  newBtn.addEventListener('click', () => {
    if(dirty && !confirm('Discard unsaved changes?')) return;
    const rel = prompt('Enter relative path (e.g. backend/new_service.py.template or app_31_backend_new.md)');
    if(!rel) return;
    const category = /^(backend|frontend|docker)/.test(rel) || rel.includes('/') ? 'code' : 'app';
    currentCategory = category; currentPath = rel; editor.value=''; originalContent=''; dirty=true;
    categoryBadge.textContent = category; pathDisplay.textContent = rel; placeholdersDisplay.textContent='';
    saveBtn.disabled=false; deleteBtn.disabled=true; setStatus('New (unsaved)','text-warning');
  });

  refreshBtn.addEventListener('click', fetchList);
  fetchList();
});
</script>
