<ul class="list-unstyled mb-0 d-flex flex-wrap gap-2 small">
  <li class="d-flex align-items-center gap-1 stat-item"><span class="stat-icon bg-primary text-white"><i class="fas fa-cubes"></i></span><span id="total-applications" class="stat-value">{{ total_applications }}</span><span class="text-muted stat-label">Apps</span></li>
  <li class="d-flex align-items-center gap-1 stat-item"><span class="stat-icon bg-success text-white"><i class="fas fa-play"></i></span><span id="running-applications" class="stat-value">{{ running_applications }}</span><span class="text-muted stat-label">Running</span></li>
  <li class="d-flex align-items-center gap-1 stat-item"><span class="stat-icon bg-info text-white"><i class="fas fa-chart-bar"></i></span><span id="analyzed-applications" class="stat-value">{{ analyzed_applications }}</span><span class="text-muted stat-label">Analyzed</span></li>
  <li class="d-flex align-items-center gap-1 stat-item"><span class="stat-icon bg-warning text-white"><i class="fas fa-brain"></i></span><span id="unique-models" class="stat-value">{{ unique_models }}</span><span class="text-muted stat-label">Models</span></li>
</ul>
