{# container partial migrated #}
<div class="row g-3">
  <div class="col-lg-6">
    <div class="card h-100">
      <div class="card-header d-flex justify-content-between align-items-center">
        <h6 class="card-title mb-0"><i class="fab fa-docker me-2"></i>Container Controls</h6>
        <span class="badge bg-{{ 'success' if app_data.container_status == 'running' else ('danger' if app_data.container_status == 'error' else 'secondary') }}">{{ app_data.container_status|default('unknown')|title }}</span>
      </div>
      <div class="card-body">
        <div class="btn-group" role="group">
          <button class="btn btn-outline-primary" hx-post="/api/app/{{ app_data.model_slug }}/{{ app_data.app_number }}/start" hx-swap="none" hx-on:htmx:afterRequest="location.reload()"><i class="fas fa-play me-1"></i>Start</button>
          <button class="btn btn-outline-warning" hx-post="/api/app/{{ app_data.model_slug }}/{{ app_data.app_number }}/stop" hx-swap="none" hx-on:htmx:afterRequest="location.reload()"><i class="fas fa-stop me-1"></i>Stop</button>
          <button class="btn btn-outline-info" hx-post="/api/app/{{ app_data.model_slug }}/{{ app_data.app_number }}/restart" hx-swap="none" hx-on:htmx:afterRequest="location.reload()"><i class="fas fa-redo me-1"></i>Restart</button>
          <button class="btn btn-outline-secondary" hx-post="/api/app/{{ app_data.model_slug }}/{{ app_data.app_number }}/build" hx-swap="none" hx-on:htmx:afterRequest="location.reload()"><i class="fas fa-hammer me-1"></i>Build</button>
        </div>
        <div class="mt-3">
          <a class="btn btn-sm btn-outline-info open-frontend-btn" target="_blank"
             data-port="{{ (ports.frontend if ports else (ports.get('frontend') if ports and ports.get('frontend') else '') ) }}"
             href="#"
             onclick="(function(e){ e.preventDefault(); var port=this.getAttribute('data-port'); if(!port){ return; } var host=window.location.hostname || 'localhost'; var url='http://'+host+':'+port; window.open(url, '_blank'); }).call(this,event)">
            <i class="fas fa-external-link-alt me-1"></i>Open Frontend
          </a>
        </div>
      </div>
    </div>
  </div>
  <div class="col-lg-6">
    <div class="card h-100">
      <div class="card-header d-flex justify-content-between align-items-center">
        <h6 class="card-title mb-0"><i class="fas fa-file-alt me-2"></i>Logs</h6>
  <button class="btn btn-sm btn-outline-secondary"
    hx-get="/models/application/{{ app_data.model_slug }}/{{ app_data.app_number }}/logs/modal"
    hx-target="#modal-container" hx-swap="innerHTML"
    hx-on::afterOnLoad="(function(){var m=document.getElementById('logsModal'); if(m && window.bootstrap){ var inst=new bootstrap.Modal(m); inst.show(); }})();">
    <i class="fas fa-external-link-alt me-1"></i>Open Modal
  </button>
      </div>
      <div class="card-body">
        <p class="text-muted mb-0">Open the container logs modal to view live logs for backend and frontend services.</p>
      </div>
    </div>
  </div>
</div>
