<!-- Table rows for HTMX sync status updates -->
{% for app in entry.apps %}
<tr>
  <td>
    <input type="checkbox" class="form-check-input" name="selected_apps" value="{{ app.app_number }}">
  </td>
  <td>
    <a href="{{ url_for('models.application_detail', model_slug=entry.model.canonical_slug, app_number=app.app_number) }}" class="text-decoration-none">
      #{{ app.app_number }}
    </a>
  </td>
  <td>{{ app.app_type|replace('_', ' ')|title }}</td>
  <td>
    <span class="badge badge-sm {{ 'bg-success' if app.status == 'running' else 'bg-danger' if app.status == 'stopped' else 'bg-secondary' }}">
      {{ app.status|title }}
    </span>
  </td>
  <td>
    <div class="btn-group btn-group-sm" role="group">
      <a href="{{ url_for('models.application_detail', model_slug=entry.model.canonical_slug, app_number=app.app_number) }}" 
         class="btn btn-outline-primary btn-sm" title="View Details">
        <i class="ti ti-eye"></i>
      </a>
      {% if app.status != 'running' %}
      <button class="btn btn-outline-success btn-sm" data-action="start" data-app="{{ app.app_number }}" title="Start">
        <i class="ti ti-play"></i>
      </button>
      {% else %}
      <button class="btn btn-outline-danger btn-sm" data-action="stop" data-app="{{ app.app_number }}" title="Stop">
        <i class="ti ti-square"></i>
      </button>
      {% endif %}
      <button class="btn btn-outline-info btn-sm" data-action="logs" data-app="{{ app.app_number }}" title="View Logs">
        <i class="ti ti-file-text"></i>
      </button>
    </div>
  </td>
</tr>
{% endfor %}
