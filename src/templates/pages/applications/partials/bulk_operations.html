{# Simplified Bulk Docker Modal: only build / start / stop / restart #}
<div class="modal fade" id="bulkDockerModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="fab fa-docker me-2"></i>Bulk Docker</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="simple-bulk-form">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <div class="d-flex gap-3 flex-wrap">
              <button type="button" class="btn btn-success btn-sm bulk-op" data-op="start">Start</button>
              <button type="button" class="btn btn-secondary btn-sm bulk-op" data-op="stop">Stop</button>
              <button type="button" class="btn btn-warning btn-sm bulk-op" data-op="restart">Restart</button>
              <button type="button" class="btn btn-info btn-sm bulk-op" data-op="build">Build</button>
            </div>
            <div class="d-flex gap-3 small align-items-center">
              <label class="d-flex align-items-center gap-1 m-0"><input type="checkbox" id="bulk-select-all" class="form-check-input"/> All</label>
              <label class="d-flex align-items-center gap-1 m-0"><input type="checkbox" id="bulk-select-running" class="form-check-input"/> Running</label>
              <button class="btn btn-sm btn-outline-secondary" type="button" hx-get="/api/apps/bulk/list" hx-target="#bulk-apps-list" hx-swap="innerHTML">Reload</button>
            </div>
          </div>
          <div id="bulk-apps-list" class="border rounded p-2 bg-body-tertiary small" style="min-height:180px" hx-get="/api/apps/bulk/list" hx-trigger="load">
            <div class="text-muted small">Loading applications...</div>
          </div>
        </form>
        <div class="mt-3 small" id="simple-bulk-results"></div>
      </div>
      <div class="modal-footer">
        <span class="spinner-border spinner-border-sm text-primary d-none" id="simple-bulk-spinner" role="status"></span>
        <button class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>
<script>
(function(){
  function getSelected(){
    var list = document.getElementById('bulk-apps-list');
    if(!list) return [];
    return Array.from(list.querySelectorAll('input[name=items]:checked')).map(c=>c.value);
  }
  function refreshSelectAll(){
    var allBox = document.getElementById('bulk-select-all');
    var list = document.getElementById('bulk-apps-list');
    if(!allBox || !list) return;
    var checks = list.querySelectorAll('input[name=items]');
    allBox.checked = checks.length>0 && Array.from(checks).every(c=>c.checked);
  }
  document.addEventListener('change', function(e){
    if(e.target && e.target.id==='bulk-select-all'){
      var list=document.getElementById('bulk-apps-list');
      var checks=list?list.querySelectorAll('input[name=items]'):[];
      checks.forEach(c=>c.checked=e.target.checked);
    }
    if(e.target && e.target.id==='bulk-select-running'){
      var runningOnly=e.target.checked;
      var list=document.getElementById('bulk-apps-list');
      if(list){
        list.querySelectorAll('label').forEach(l=>{
          if(!runningOnly){ l.classList.remove('d-none'); return; }
          var badge=l.querySelector('.badge');
          if(badge && /running/i.test(badge.textContent)){ l.classList.remove('d-none'); } else { l.classList.add('d-none'); }
        });
      }
    }
    if(e.target && e.target.name==='items'){ refreshSelectAll(); }
  });
  document.addEventListener('htmx:afterSwap', function(e){
    if(e.target && e.target.id==='bulk-apps-list'){ refreshSelectAll(); }
  });
  document.querySelectorAll('#bulkDockerModal .bulk-op').forEach(btn=>{
    btn.addEventListener('click', function(){
      var op=this.getAttribute('data-op');
      var selected=getSelected();
      var results=document.getElementById('simple-bulk-results');
      if(!selected.length){
        results.innerHTML='<div class="alert alert-warning py-1 px-2 small mb-0">Select at least one application.</div>';
        return;
      }
      var spinner=document.getElementById('simple-bulk-spinner');
      spinner && spinner.classList.remove('d-none');
      var form=new FormData();
      form.append('operation', op);
      selected.forEach(v=>form.append('items', v));
      fetch('/api/apps/bulk/docker', {method:'POST', body: form, headers:{'HX-Request':'true'}})
        .then(r=>r.text())
        .then(html=>{ results.innerHTML=html; })
        .catch(err=>{ results.innerHTML='<div class="text-danger small">Error: '+err+'</div>'; })
        .finally(()=>{ spinner && spinner.classList.add('d-none'); });
    });
  });
})();
</script>
