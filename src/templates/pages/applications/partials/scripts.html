<script src="/static/js/applications.js"></script>
<script>
// Legacy helpers kept (no-ops now referencing new table layout selectors)
function expandAll(){
  document.querySelectorAll('#applications-accordion .collapse').forEach(c=>{
    if(!c.classList.contains('show')) new bootstrap.Collapse(c,{toggle:true});
  });
}
function collapseAll(){
  document.querySelectorAll('#applications-accordion .collapse.show').forEach(c=> new bootstrap.Collapse(c,{toggle:true}));
}
function syncModel(modelSlug, target){
  if(window.htmx){
    htmx.ajax('POST', `/api/model/${modelSlug}/containers/sync-status?format=html`, { target: target });
  }
}

document.addEventListener('DOMContentLoaded', function() {
  const filtersForm = document.getElementById('filters-form');
  if (filtersForm) {
    filtersForm.addEventListener('change', () => window.htmx && htmx.trigger(filtersForm,'submit'));
  }

  const refreshBtn = document.getElementById('refreshGridBtn'); // same id to avoid breaking existing selectors
  if (refreshBtn) {
    refreshBtn.addEventListener('click', () => {
      if(window.htmx){
        htmx.trigger(document.body,'refresh-apps-table');
        const icon = refreshBtn.querySelector('i');
        if(icon){
          const orig = icon.className; icon.className='fas fa-spinner fa-spin me-1';
          setTimeout(()=> icon.className=orig, 1200);
        }
      }
    });
  }

  // Group select logic
  document.addEventListener('change', function(e){
    if(e.target.classList.contains('select-group')){
      const collapseId = e.target.getAttribute('data-group');
      document.querySelectorAll(`#${collapseId} .app-select`).forEach(cb=>{ cb.checked = e.target.checked; });
    }
  });
});
</script>
<style>
  #applications-sidebar { position: sticky; top: 90px; }
  @media (max-width: 991.98px){ #applications-sidebar { position: static; top:auto; } }
  #applications-sidebar .card { box-shadow:none; }
  #applications-sidebar .card .avatar { width:38px; height:38px; display:flex; align-items:center; justify-content:center; font-size:1rem; }
  #applications-sidebar { max-height: calc(100vh - 110px); overflow-y:auto; scrollbar-width: thin; }
  #applications-sidebar::-webkit-scrollbar { width: 6px; }
  #applications-sidebar::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius:3px; }
  .mini-stats .stat-icon { width:26px; height:26px; display:inline-flex; align-items:center; justify-content:center; border-radius:4px; font-size:.75rem; }
  .mini-stats .stat-value { font-weight:600; font-size:.9rem; }
  .mini-stats .stat-label { font-size:.65rem; text-transform:uppercase; letter-spacing:.5px; }
  .mini-stats ul { row-gap:.35rem !important; }
  .mini-stats .stat-item { background:var(--tblr-bg-surface,#fff); padding:2px 6px 2px 4px; border:1px solid var(--tblr-border-color); border-radius:6px; line-height:1; }
  .mini-stats .stat-item:hover { background:var(--tblr-bg-surface-hover,#f8f9fa); }
</style>
