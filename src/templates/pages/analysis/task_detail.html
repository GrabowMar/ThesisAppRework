{% extends 'layouts/base.html' %}
{% block content %}
<div class="d-flex align-items-center mb-3 flex-wrap gap-2">
  <h2 class="h4 mb-0 d-flex align-items-center gap-2"><i class="fa-solid fa-microscope"></i> Task {{ task.task_id }}</h2>
  <a href="/analysis/tasks" class="btn btn-outline-secondary btn-sm"><i class="fa fa-arrow-left me-1"></i> All Tasks</a>
  <button class="btn btn-outline-dark btn-sm" hx-get="/analysis/api/tasks/{{ task.task_id }}/detail" hx-target="#task-core" hx-swap="innerHTML" title="Refresh"><i class="fa fa-rotate"></i></button>
  <a class="btn btn-outline-info btn-sm" href="/analysis/api/tasks/{{ task.task_id }}/results.json" target="_blank"><i class="fa fa-file-code me-1"></i> Raw JSON</a>
</div>
<div id="task-core" hx-get="/analysis/api/tasks/{{ task.task_id }}/detail" hx-trigger="load" class="mb-4"></div>
<div class="card">
  <div class="card-header d-flex align-items-center justify-content-between py-2">
    <strong class="small text-uppercase">Results Preview</strong>
    <small class="text-muted">First 50 findings (if any)</small>
  </div>
  <div class="card-body small" id="results-json" hx-get="/analysis/api/tasks/{{ task.task_id }}/results.json" hx-trigger="load" hx-target="this" hx-swap="innerHTML">
    <div class="text-muted">Loading results JSON…</div>
  </div>
</div>
<script>
  document.addEventListener('htmx:afterOnLoad', function(ev){
    if(ev.detail.elt.id === 'results-json' && typeof ev.detail.xhr === 'object'){
      try{ const txt = ev.detail.xhr.responseText; if(txt && txt.trim().startsWith('{')){ ev.detail.elt.textContent = txt; ev.detail.elt.classList.add('code-block'); } }catch(e){}
    }
  });
</script>
{% endblock %}
