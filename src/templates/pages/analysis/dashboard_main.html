{% extends 'layouts/base.html' %}
{% block title %}Analysis Dashboard{% endblock %}
{% block content %}
<div class="container-fluid py-3">
  <h1 class="h3 mb-3">Analysis Dashboard</h1>
  <div class="row g-3">
    <div class="col-md-3">
      <div class="card stat-card"><div class="card-body"><div id="analysis-stats" hx-get="/api/dashboard/stats-fragment" hx-trigger="load" hx-swap="outerHTML">Loading stats...</div></div></div>
    </div>
    <div class="col-md-9">
      <div class="card h-100"><div class="card-header"><h5 class="mb-0">Analyzer Services</h5></div>
        <div class="card-body" id="analyzer-services" hx-get="/api/dashboard/analyzer-services" hx-trigger="load" hx-swap="innerHTML">Loading services...</div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
