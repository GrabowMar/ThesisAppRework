<!-- Analysis List - Comprehensive view with filtering and sorting -->
<div class="content-wrapper" id="analysis-list">
  <!-- Page Header -->
  <div class="content-header">
    <div class="container-fluid">
      <div class="row mb-2">
        <div class="col-sm-6">
          <h1><i class="fas fa-list mr-2"></i>All Analyses</h1>
          <p class="text-muted">Comprehensive view of all analysis results with filtering and sorting</p>
        </div>
        <div class="col-sm-6">
          <div class="float-right">
            <a href="/analysis" class="btn btn-outline-secondary mr-2">
              <i class="fas fa-tachometer-alt mr-1"></i> Dashboard
            </a>
            <div class="btn-group">
              <button type="button" class="btn btn-success dropdown-toggle" data-toggle="dropdown">
                <i class="fas fa-plus mr-1"></i> New Analysis
              </button>
              <div class="dropdown-menu">
                <a class="dropdown-item" href="/analysis/security/start">
                  <i class="fas fa-shield-alt mr-2"></i> Security Analysis
                </a>
                <a class="dropdown-item" href="/analysis/performance/start">
                  <i class="fas fa-tachometer-alt mr-2"></i> Performance Test
                </a>
                <a class="dropdown-item" href="/analysis/dynamic/start">
                  <i class="fas fa-bug mr-2"></i> Dynamic Analysis
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <section class="content">
    <div class="container-fluid">

      <!-- Filters and Controls -->
      <div class="card card-outline card-primary">
        <div class="card-header">
          <h3 class="card-title"><i class="fas fa-filter mr-2"></i>Filters</h3>
          <div class="card-tools">
            <button type="button" class="btn btn-tool" data-card-widget="collapse">
              <i class="fas fa-minus"></i>
            </button>
          </div>
        </div>
        <div class="card-body">
          <div class="row">
            <div class="col-md-3">
              <div class="form-group">
                <label>Analysis Type</label>
                <select class="form-control" id="filter-type">
                  <option value="">All Types</option>
                  <option value="security">Security</option>
                  <option value="performance">Performance</option>
                  <option value="dynamic">Dynamic</option>
                </select>
              </div>
            </div>
            <div class="col-md-3">
              <div class="form-group">
                <label>Status</label>
                <select class="form-control" id="filter-status">
                  <option value="">All Statuses</option>
                  <option value="completed">Completed</option>
                  <option value="running">Running</option>
                  <option value="pending">Pending</option>
                  <option value="failed">Failed</option>
                </select>
              </div>
            </div>
            <div class="col-md-3">
              <div class="form-group">
                <label>Model</label>
                <select class="form-control" id="filter-model">
                  <option value="">All Models</option>
                  <!-- Will be populated via HTMX -->
                </select>
              </div>
            </div>
            <div class="col-md-3">
              <div class="form-group">
                <label>Date Range</label>
                <select class="form-control" id="filter-date">
                  <option value="">All Time</option>
                  <option value="today">Today</option>
                  <option value="week">This Week</option>
                  <option value="month">This Month</option>
                </select>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-md-6">
              <button class="btn btn-primary" onclick="applyFilters()">
                <i class="fas fa-search mr-1"></i> Apply Filters
              </button>
              <button class="btn btn-outline-secondary ml-2" onclick="clearFilters()">
                <i class="fas fa-times mr-1"></i> Clear
              </button>
            </div>
            <div class="col-md-6">
              <div class="float-right">
                <div class="btn-group">
                  <button type="button" class="btn btn-outline-primary btn-sm" onclick="refreshList()">
                    <i class="fas fa-sync-alt mr-1"></i> Refresh
                  </button>
                  <button type="button" class="btn btn-outline-secondary btn-sm dropdown-toggle dropdown-toggle-split" data-toggle="dropdown">
                  </button>
                  <div class="dropdown-menu">
                    <a class="dropdown-item" href="#" onclick="exportResults('csv')">
                      <i class="fas fa-file-csv mr-2"></i> Export CSV
                    </a>
                    <a class="dropdown-item" href="#" onclick="exportResults('json')">
                      <i class="fas fa-file-code mr-2"></i> Export JSON
                    </a>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Analysis Results -->
      <div class="card">
        <div class="card-header">
          <h3 class="card-title"><i class="fas fa-table mr-2"></i>Analysis Results</h3>
          <div class="card-tools">
            <span class="badge badge-primary" id="results-count">Loading...</span>
          </div>
        </div>
        <div class="card-body" id="analysis-results-container">
          <!-- Results will be loaded via HTMX -->
          <div class="text-center">
            <div class="spinner-border" role="status">
              <span class="sr-only">Loading...</span>
            </div>
            <p class="mt-2">Loading analysis results...</p>
          </div>
        </div>
        <div class="card-footer">
          <div class="row">
            <div class="col-sm-12 col-md-5">
              <div class="dataTables_info" id="results-info">
                Showing 0 to 0 of 0 entries
              </div>
            </div>
            <div class="col-sm-12 col-md-7">
              <div class="dataTables_paginate paging_simple_numbers" id="results-pagination">
                <!-- Pagination will be added via HTMX -->
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </section>
</div>

<script>
// Analysis List JavaScript functionality
let currentFilters = {};
let currentSort = { field: 'created_at', direction: 'desc' };

function applyFilters() {
  currentFilters = {
    type: document.getElementById('filter-type').value,
    status: document.getElementById('filter-status').value,
    model: document.getElementById('filter-model').value,
    date: document.getElementById('filter-date').value
  };
  loadResults();
}

function clearFilters() {
  document.getElementById('filter-type').value = '';
  document.getElementById('filter-status').value = '';
  document.getElementById('filter-model').value = '';
  document.getElementById('filter-date').value = '';
  currentFilters = {};
  loadResults();
}

function sortBy(field) {
  if (currentSort.field === field) {
    currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
  } else {
    currentSort.field = field;
    currentSort.direction = 'asc';
  }
  loadResults();
}

function refreshList() {
  loadResults();
}

function loadResults() {
  // This would typically use HTMX to load results
  // For now, show a loading state
  const container = document.getElementById('analysis-results-container');
  container.innerHTML = `
    <div class="text-center">
      <div class="spinner-border" role="status">
        <span class="sr-only">Loading...</span>
      </div>
      <p class="mt-2">Loading filtered results...</p>
    </div>
  `;
  
  // Simulate loading (in real implementation, this would be HTMX)
  setTimeout(() => {
    container.innerHTML = `
      <div class="text-center text-muted">
        <i class="fas fa-info-circle fa-2x mb-3"></i>
        <h5>Results will be loaded here</h5>
        <p>This will be implemented with HTMX to load analysis results dynamically based on filters and sorting.</p>
        <button class="btn btn-primary" onclick="window.location.href='/analysis'">
          <i class="fas fa-arrow-left mr-1"></i> Back to Dashboard
        </button>
      </div>
    `;
    document.getElementById('results-count').textContent = '0 results';
    document.getElementById('results-info').textContent = 'No results found';
  }, 1000);
}

function exportResults(format) {
  alert('Export to ' + format.toUpperCase() + ' - This will be implemented to export filtered results');
}

// Initialize page
document.addEventListener('DOMContentLoaded', function() {
  // Load initial results
  loadResults();
  
  // Load model options (would be done via HTMX in real implementation)
  // For demo purposes, show placeholder
  setTimeout(() => {
    const modelSelect = document.getElementById('filter-model');
    modelSelect.innerHTML = `
      <option value="">All Models</option>
      <option value="anthropic_claude-3.7-sonnet">Claude 3.7 Sonnet</option>
      <option value="openai_gpt-4">GPT-4</option>
      <option value="openai_gpt-3.5-turbo">GPT-3.5 Turbo</option>
    `;
  }, 500);
});
</script>
