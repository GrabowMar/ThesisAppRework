<div class="card">
  <div class="card-header d-flex justify-content-between align-items-center">
    <h5 class="mb-0"><i class="fas fa-heartbeat me-2"></i>System Health</h5>
    <div class="btn-group btn-group-sm">
      <button type="button" class="btn btn-outline-primary" 
              hx-get="/api/dashboard/system-health-fragment"
              hx-target="#system-health-content"
              hx-indicator="#health-spinner">
        <i class="fas fa-sync-alt me-1"></i>Refresh
      </button>
    </div>
  </div>
  <div class="card-body" id="system-health-content"
       hx-get="/api/dashboard/system-health-fragment"
       hx-trigger="load, every 30s"
       hx-target="#system-health-content"
       hx-swap="innerHTML">
    <div class="text-center py-3" id="health-spinner">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading health status...</span>
      </div>
    </div>
  </div>
</div>
