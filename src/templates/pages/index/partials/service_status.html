<div class="card">
  <div class="card-header"><h5 class="mb-0"><i class="fas fa-server me-2"></i>Service Status</h5></div>
  <div class="card-body" id="service-status"
       hx-get="/api/dashboard/services"
       hx-trigger="load, every 45s"
       hx-target="#service-status"
       hx-swap="innerHTML">
    <div class="text-center py-3"><div class="spinner-border spinner-border-sm text-primary" role="status"><span class="visually-hidden">Loading services...</span></div></div>
  </div>
</div>
