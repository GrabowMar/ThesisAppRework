<div class="card">
  <div class="card-header d-flex justify-content-between align-items-center">
    <h3 class="card-title mb-0"><i class="fas fa-bolt me-2"></i>Quick Actions</h3>
    <div class="btn-list">
      <button type="button" class="btn btn-sm btn-outline-primary" 
              hx-get="/api/dashboard/refresh" 
              hx-swap="none" 
              hx-indicator="#global-spinner">
        <i class="fas fa-sync-alt me-1"></i>Refresh All
      </button>
      <button type="button" class="btn btn-sm btn-outline-success" 
              hx-get="/analysis/create" 
              hx-target="#main-modal" 
              hx-trigger="click"
              data-bs-toggle="modal" 
              data-bs-target="#main-modal">
        <i class="fas fa-plus me-1"></i>New Analysis
      </button>
      <button type="button" class="btn btn-sm btn-outline-info"
              hx-get="/models/quick-select"
              hx-target="#model-selector"
              hx-swap="innerHTML">
        <i class="fas fa-robot me-1"></i>Select Model
      </button>
      <button type="button" class="btn btn-sm btn-outline-warning"
              onclick="reloadCoreData(this)"
              title="Reload model capabilities, summary and port config from misc/*.json">
        <i class="fas fa-database me-1"></i>Reload Data
      </button>
    </div>
  </div>
  <div class="card-body">
    <div class="row row-cards">
      <div class="col-md-3">
        <div class="card card-sm card-link">
          <div class="card-body d-flex align-items-center p-3">
            <span class="avatar me-3 bg-primary text-white">
              <i class="fas fa-play"></i>
            </span>
            <div>
              <div class="font-weight-medium">Start Analysis</div>
              <div class="text-muted">Begin new test</div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card card-sm card-link">
          <div class="card-body d-flex align-items-center p-3">
            <span class="avatar me-3 bg-success text-white">
              <i class="fas fa-code"></i>
            </span>
            <div>
              <div class="font-weight-medium">Generate App</div>
              <div class="text-muted">Create sample</div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <a class="card card-sm card-link" href="/models/">
          <div class="card-body d-flex align-items-center p-3">
            <span class="avatar me-3 bg-info text-white">
              <i class="fas fa-robot"></i>
            </span>
            <div>
              <div class="font-weight-medium">Browse Models</div>
              <div class="text-muted">View catalog</div>
            </div>
          </div>
        </a>
      </div>
      <div class="col-md-3">
        <div class="card card-sm card-link">
          <div class="card-body d-flex align-items-center p-3">
            <span class="avatar me-3 bg-warning text-white">
              <i class="fas fa-tools"></i>
            </span>
            <div>
              <div class="font-weight-medium">Maintenance</div>
              <div class="text-muted">System tools</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
