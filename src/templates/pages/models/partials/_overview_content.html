{# Models table content only - no embedded sidebar #}
<div class="card mb-3">
	<div class="card-header py-2 d-flex flex-wrap gap-2 align-items-center justify-content-between small">
		<div class="d-flex flex-wrap align-items-center gap-2">
			<label class="d-flex align-items-center gap-1 mb-0">Per page:
				<select id="models-per-page" class="form-select form-select-sm w-auto" onchange="changePerPage(this.value)">
					<option value="10">10</option>
					<option value="25" selected>25</option>
					<option value="50">50</option>
					<option value="100">100</option>
				</select>
			</label>
					<div class="btn-group btn-group-sm" role="group" aria-label="Data source">
						<button type="button" class="btn btn-outline-secondary active" id="src-db" onclick="setModelsSource('db')">All</button>
						<button type="button" class="btn btn-outline-secondary" id="src-used" onclick="setModelsSource('used')" title="Locally installed / used">Used</button>
						<button type="button" class="btn btn-outline-secondary" id="src-openrouter" onclick="setModelsSource('openrouter')">OpenRouter</button>
					</div>
			<span class="text-muted" id="models-source-indicator"></span>
		</div>
		<div class="d-flex align-items-center gap-2">
			<button class="btn btn-outline-primary btn-sm" onclick="refreshModels()"><i class="fas fa-sync"></i></button>
			<button class="btn btn-outline-secondary btn-sm" data-bs-toggle="modal" data-bs-target="#batchOperationsModal" title="Batch actions" onclick="updateBatchSelectionCount()"><i class="fas fa-layer-group"></i></button>
		</div>
	</div>
	<div class="card-body p-0">
		<div class="table-responsive" style="max-height:70vh; overflow:auto;">
			<table class="table table-sm table-hover table-striped table-vcenter mb-0" id="models-table">
        <thead>
          <tr>
            <th class="w-1">
              <label class="form-check">
                <input type="checkbox" id="select-all-models" class="form-check-input" onchange="toggleSelectAll()"/>
              </label>
            </th>
						<th class="text-nowrap">Model</th>
						<th class="text-nowrap">Prov</th>
						<th class="text-nowrap">Caps</th>
						<th class="text-nowrap">Price/1K</th>
						<th class="text-nowrap">Ctx</th>
						<th class="text-nowrap">Status</th>
						<th class="text-nowrap">Perf</th>
						<th class="w-1 text-nowrap">Act</th>
          </tr>
        </thead>
        <tbody id="models-table-body"></tbody>
      </table>
    </div>
		<div class="d-flex flex-wrap justify-content-between align-items-center p-2 border-top small gap-2" id="models-pagination-bar">
			<div id="models-page-summary" class="text-muted">Page 1</div>
			<nav aria-label="Models pagination" class="ms-auto">
				<ul class="pagination pagination-sm mb-0" id="models-pagination"></ul>
			</nav>
		</div>
  </div>
</div>
<div id="comparison-panel" class="mt-3"></div>
<div id="loading-spinner" class="text-center py-4" style="display:none">
  <div class="spinner-border text-primary" role="status">
    <span class="visually-hidden">Loading...</span>
  </div>
  <p class="text-muted mt-2">Loading models...</p>
</div>
<div class="modal fade" id="modelDetailsModal" tabindex="-1">
	<div class="modal-dialog modal-lg">
		<div class="modal-content" id="model-details-modal-content"></div>
	</div>
</div>

<div class="modal fade" id="batchOperationsModal" tabindex="-1">
	<div class="modal-dialog">
		<div class="modal-content">
			<div class="modal-header">
				<h5 class="modal-title">Batch Operations</h5>
				<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
			</div>
			<div class="modal-body">
				<p>Perform operations on <span id="selected-models-count">0</span> selected models:</p>
				<div class="list-group">
					<button class="list-group-item list-group-item-action" onclick="batchAnalyze()">
						<i class="fas fa-play me-2"></i>Run Analysis
					</button>
					<button class="list-group-item list-group-item-action" onclick="batchExport()">
						<i class="fas fa-download me-2"></i>Export Selected
					</button>
					<button class="list-group-item list-group-item-action text-warning" onclick="batchUpdateStatus()">
						<i class="fas fa-edit me-2"></i>Update Status
					</button>
					<button class="list-group-item list-group-item-action text-danger" onclick="batchDelete()">
						<i class="fas fa-trash me-2"></i>Delete
					</button>
				</div>
			</div>
			<div class="modal-footer">
				<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
			</div>
		</div>
	</div>
</div>
