{# Applications table content only - matches models table structure #}
<div class="card mb-3">
  <div class="card-header py-2 d-flex flex-wrap gap-2 align-items-center justify-content-between small">
    <div class="d-flex flex-wrap align-items-center gap-2">
      <label class="d-flex align-items-center gap-1 mb-0">Per page:
        <select id="apps-per-page" class="form-select form-select-sm w-auto" onchange="changeApplicationsPerPage(this.value)">
          <option value="10">10</option>
          <option value="25" selected>25</option>
          <option value="50">50</option>
          <option value="100">100</option>
        </select>
      </label>
      <div class="btn-group btn-group-sm" role="group" aria-label="Batch docker actions">
        <button class="btn btn-outline-success" type="button" title="Start selected" onclick="batchDockerOp('start')"><i class="fas fa-play"></i></button>
        <button class="btn btn-outline-danger" type="button" title="Stop selected" onclick="batchDockerOp('stop')"><i class="fas fa-stop"></i></button>
        <button class="btn btn-outline-warning" type="button" title="Restart selected" onclick="batchDockerOp('restart')"><i class="fas fa-rotate"></i></button>
        <button class="btn btn-outline-primary" type="button" title="Build selected" onclick="batchDockerOp('build')"><i class="fas fa-hammer"></i></button>
      </div>
      <span class="text-muted" id="applications-source-indicator"></span>
    </div>
    <div class="d-flex align-items-center gap-2">
      <button class="btn btn-outline-primary btn-sm" onclick="refreshApplications()" title="Refresh applications"><i class="fas fa-sync"></i></button>
      <button class="btn btn-outline-secondary btn-sm" data-bs-toggle="modal" data-bs-target="#generateAppModal" title="Generate application"><i class="fas fa-plus"></i></button>
      <span class="text-muted" id="applications-selection-indicator"></span>
    </div>
  </div>
  <div class="card-body p-0">
    <div class="table-responsive apps-table-scroll">
      <table class="table table-sm table-hover table-striped table-vcenter mb-0" id="applications-table">
        <thead>
          <tr>
            <th class="w-1">
              <label class="form-check">
                <input type="checkbox" id="select-all-apps" class="form-check-input" onchange="toggleSelectAllApplications()" title="Select all applications" aria-label="Select all applications"/>
              </label>
            </th>
            <th class="text-nowrap">Model</th>
            <th class="text-nowrap">App</th>
            <th class="text-nowrap">Type</th>
            <th class="text-nowrap">Status</th>
            <th class="text-nowrap">Ports</th>
            <th class="text-nowrap">Cmp</th>
            <th class="text-nowrap">Code</th>
            <th class="w-1 text-nowrap">Act</th>
          </tr>
        </thead>
        <tbody id="applications-table-body"></tbody>
      </table>
    </div>
    <div class="d-flex flex-wrap justify-content-between align-items-center p-2 border-top small gap-2" id="applications-pagination-bar">
      <div id="applications-page-summary" class="text-muted">Page 1</div>
      <nav aria-label="Applications pagination" class="ms-auto">
        <ul class="pagination pagination-sm mb-0" id="applications-pagination"></ul>
      </nav>
    </div>
  </div>
</div>
<div id="applications-comparison-panel" class="mt-3"></div>
<div id="applications-loading-spinner" class="text-center py-4 d-none">
  <div class="spinner-border text-primary" role="status">
    <span class="visually-hidden">Loading...</span>
  </div>
  <p class="text-muted mt-2">Loading applications...</p>
</div>

<div class="modal fade" id="batchApplicationsModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Batch Operations</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p>Perform operations on <span id="selected-applications-count">0</span> selected applications:</p>
        <div class="list-group">
          <button class="list-group-item list-group-item-action" onclick="batchDockerOp('start')">
            <i class="fas fa-play me-2"></i>Start All
          </button>
          <button class="list-group-item list-group-item-action" onclick="batchDockerOp('stop')">
            <i class="fas fa-stop me-2"></i>Stop All
          </button>
          <button class="list-group-item list-group-item-action" onclick="batchDockerOp('restart')">
            <i class="fas fa-rotate me-2"></i>Restart All
          </button>
          <button class="list-group-item list-group-item-action" onclick="batchDockerOp('build')">
            <i class="fas fa-hammer me-2"></i>Build All
          </button>
          <button class="list-group-item list-group-item-action" onclick="exportApplicationsData()">
            <i class="fas fa-download me-2"></i>Export Selected
          </button>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>

<script>
function getSelectedApps(){
  return Array.from(document.querySelectorAll('#applications-table-body input.app-select:checked')).map(c=>c.value);
}

function batchDockerOp(op){
  const selected = getSelectedApps();
  const indicator = document.getElementById('applications-selection-indicator');
  console.debug('[batchDockerOp] op=', op, 'selected=', selected);
  if(!selected.length){
    if(indicator) indicator.innerHTML = '<span class="text-warning">Select at least one application</span>';
    return;
  }

  // Visual loading state
  const btns = document.querySelectorAll('[onclick^="batchDockerOp"]');
  btns.forEach(b=>{ b.disabled = true; b.dataset.originalHtml = b.innerHTML; b.innerHTML = '<span class="spinner-border spinner-border-sm"></span>'; });
  if(indicator) indicator.innerHTML = `<span class="text-info">${op.charAt(0).toUpperCase()+op.slice(1)} in progress...</span>`;

  // Use fetch to perform batch operation
  const fd = new FormData();
  fd.append('operation', op);
  selected.forEach(v=>fd.append('items', v));
  fetch('/api/apps/bulk/docker', {method:'POST', body: fd})
    .then(r=>r.text())
    .then(html=>{
      if(indicator) indicator.innerHTML = '<span class="text-success">Done</span>';
      setTimeout(()=>{ refreshApplications(); }, 400);
    })
    .catch(err=>{
      if(indicator) indicator.innerHTML = '<span class="text-danger">Error</span>';
      console.error('Bulk operation failed:', err);
    })
    .finally(()=>{ btns.forEach(b=>{ b.disabled=false; b.innerHTML = b.dataset.originalHtml; }); });
}
</script>

<style>
  #applications-table .badge.bg-azure { background:#206bc4; }
  #applications-table { box-shadow: var(--tblr-shadow,0 1px 2px rgba(0,0,0,.04)); }
  .apps-table-scroll { 
    max-height: 70vh; 
    overflow: auto; 
  }
  .d-none { 
    display: none !important; 
  }
  
  @media (max-width: 991.98px){
    #applications-table .text-nowrap { white-space:normal !important; }
  }
</style>
