{# Applications Main Content - clean layout without embedded sidebar #}
<div id="apps-table-section">
  <div id="apps-table-refresher" hx-get="/applications" hx-select="#apps-table-section" hx-target="#apps-table-section" hx-trigger="refresh-apps-table from:body" hx-swap="outerHTML"></div>
  {% include 'pages/applications/partials/table.html' %}
</div>


<!-- Generate Application Modal -->
<div class="modal fade" id="generateAppModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="fas fa-plus me-2"></i>Generate Application</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="generateAppForm" hx-post="/applications/generate" hx-target="#generateAppResult" hx-swap="innerHTML">
          <div class="mb-3">
            <label class="form-label">Model</label>
            <select class="form-select" name="model_slug" required>
              <option value="" disabled selected>Select model</option>
              {% for m in available_models %}
              <option value="{{ m.canonical_slug }}">{{ m.model_name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Application Number</label>
            <input type="number" name="app_number" class="form-control" min="1" max="30" required />
            <div class="form-hint">Range 1 - 30 maps to prompt templates</div>
          </div>
          <div class="mb-3">
            <label class="form-label">Type</label>
            <select class="form-select" name="app_type">
              <option value="web_app" selected>Web App</option>
              <option value="api_service">API Service</option>
              <option value="frontend_only">Frontend Only</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-check">
              <input class="form-check-input" type="checkbox" name="auto_start" />
              <span class="form-check-label">Auto-start container after generation</span>
            </label>
          </div>
          <div id="generateAppResult" class="small"></div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" form="generateAppForm" class="btn btn-primary"><i class="fas fa-hammer me-1"></i>Generate</button>
      </div>
    </div>
  </div>
</div>

<!-- Bulk Actions Modal (placeholder) -->
<div class="modal fade" id="bulkActionsModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="fas fa-layer-group me-2"></i>Batch Operations</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p class="text-muted mb-3">Launch analyses or container operations across multiple models.</p>
        <div id="bulkActionsContent" hx-get="/models/model_actions" hx-trigger="revealed" hx-target="#bulkActionsContent" class="text-center py-4">
          <div class="text-muted"><i class="fas fa-spinner fa-spin me-2"></i>Loading…</div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>
