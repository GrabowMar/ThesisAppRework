<div class="content-wrapper">
  <section class="content pt-3">
    <div class="container-fluid">
      <div class="row">
        <div class="col-12 col-xl-6 mb-3">
          {% include 'partials/analysis/list/active_tasks.html' %}
        </div>
        <div class="col-12 col-xl-6 mb-3">
          <div id="task-history"
               class="card"
               hx-get="{{ url_for('analysis.htmx_task_history') }}"
               hx-trigger="load, every 15s"
               hx-target="#task-history"
               hx-swap="outerHTML">
            <div class="card-header d-flex justify-content-between align-items-center">
              <div><i class="fas fa-history me-1"></i> Recent tasks</div>
              <div>
                <form class="d-inline" hx-post="{{ url_for('api.api_tasks_cleanup') }}" hx-swap="none">
                  <button class="btn btn-xs btn-outline-secondary" type="submit" title="Cleanup tasks older than 7 days">Cleanup old</button>
                </form>
              </div>
            </div>
            <div class="card-body">
              <div class="text-muted">Loading…</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>
