{# AdminLTE (dist) integration note #}
<!--begin::Weekly Trends Card-->
<div class="card">
  <div class="card-header">
    <h3 class="card-title">
      <i class="bi bi-graph-up-arrow text-warning me-2"></i>
      Weekly Trends
    </h3>
    <div class="card-tools">
      <span class="badge text-bg-light text-muted">Last 7 days</span>
    </div>
  </div>
  <div class="card-body">
    <div class="row text-center">
      <div class="col-6 border-end">
        <div class="text-center">
          <h3 class="text-primary mb-1">{{ trends.security_this_week }}</h3>
          <p class="text-muted small mb-0">Security Analyses</p>
        </div>
      </div>
      <div class="col-6">
        <div class="text-center">
          <h3 class="text-info mb-1">{{ trends.performance_this_week }}</h3>
          <p class="text-muted small mb-0">Performance Tests</p>
        </div>
      </div>
    </div>
    
    <!-- Optional trend indicators -->
    <div class="row mt-3">
      <div class="col-6 text-center">
        <small class="text-success">
          <i class="bi bi-arrow-up"></i> +12% from last week
        </small>
      </div>
      <div class="col-6 text-center">
        <small class="text-success">
          <i class="bi bi-arrow-up"></i> +8% from last week
        </small>
      </div>
    </div>
  </div>
</div>
<!--end::Weekly Trends Card-->
