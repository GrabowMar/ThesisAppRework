{# AdminLTE (dist) integration note #}
{% from 'partials/common/_module_wrapper.html' import module_card %}

{% call module_card(title='Stats', classes='module-sidebar-stats body-compact', body_classes='p-2') %}
    <div id="sidebar-stats"
         class="sidebar-stats"
         hx-get="{{ url_for('api.sidebar_stats') }}"
         hx-trigger="load, every 30s"
         hx-target="#sidebar-stats"
         hx-swap="innerHTML"
         hx-indicator="#global-spinner">
        <div class="row">
            <div class="col-6 mb-2">
                <div class="stat-item text-center">
                    <div class="placeholder-glow mb-1"><span class="placeholder col-4"></span></div>
                    <small class="stat-label text-muted">AI Models</small>
                </div>
            </div>
            <div class="col-6 mb-2">
                <div class="stat-item text-center">
                    <div class="placeholder-glow mb-1"><span class="placeholder col-4"></span></div>
                    <small class="stat-label text-muted">Apps</small>
                </div>
            </div>
            <div class="col-6">
                <div class="stat-item text-center">
                    <div class="placeholder-glow mb-1"><span class="placeholder col-4"></span></div>
                    <small class="stat-label text-muted">Security Tests</small>
                </div>
            </div>
            <div class="col-6">
                <div class="stat-item text-center">
                    <div class="placeholder-glow mb-1"><span class="placeholder col-4"></span></div>
                    <small class="stat-label text-muted">Performance Tests</small>
                </div>
            </div>
    </div>
    </div>
{% endcall %}
