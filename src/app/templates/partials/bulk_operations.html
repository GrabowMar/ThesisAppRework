<!-- Bulk Operations Modal Content -->
<div class="modal-header">
    <h5 class="modal-title">
        <i class="fas fa-layer-group me-2"></i>Bulk Operations
    </h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>

<div class="modal-body">
    <div class="row">
        <div class="col-md-6">
            <h6>Model Selection</h6>
            <div class="mb-3">
                <label class="form-label">Select Models:</label>
                <div class="model-selection" style="max-height: 200px; overflow-y: auto;">
                    <!-- This would be dynamically populated with available models -->
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="all" id="selectAll">
                        <label class="form-check-label fw-bold" for="selectAll">
                            Select All Models
                        </label>
                    </div>
                    <hr>
                    <!-- Individual model checkboxes would go here -->
                    <div class="text-muted">
                        <i class="fas fa-info-circle me-1"></i>
                        Model selection will be loaded dynamically
                    </div>
                </div>
            </div>
        </div>
        
        <div class="col-md-6">
            <h6>Available Operations</h6>
            <div class="list-group">
                <button type="button" class="list-group-item list-group-item-action" onclick="startBulkContainers()">
                    <i class="fas fa-play text-success me-2"></i>
                    <strong>Start All Containers</strong>
                    <small class="d-block text-muted">Start containers for selected models</small>
                </button>
                
                <button type="button" class="list-group-item list-group-item-action" onclick="stopBulkContainers()">
                    <i class="fas fa-stop text-danger me-2"></i>
                    <strong>Stop All Containers</strong>
                    <small class="d-block text-muted">Stop containers for selected models</small>
                </button>
                
                <button type="button" class="list-group-item list-group-item-action" onclick="runBulkAnalysis()">
                    <i class="fas fa-shield-alt text-warning me-2"></i>
                    <strong>Security Analysis</strong>
                    <small class="d-block text-muted">Run security tests on selected models</small>
                </button>
                
                <button type="button" class="list-group-item list-group-item-action" onclick="runBulkPerformance()">
                    <i class="fas fa-tachometer-alt text-info me-2"></i>
                    <strong>Performance Testing</strong>
                    <small class="d-block text-muted">Run performance tests on selected models</small>
                </button>
            </div>
        </div>
    </div>
</div>

<div class="modal-footer">
    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
    <button type="button" class="btn btn-primary" onclick="executeBulkOperation()">
        <i class="fas fa-play me-2"></i>Execute Selected Operation
    </button>
</div>
