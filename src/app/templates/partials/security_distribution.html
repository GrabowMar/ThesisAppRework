<!-- Security Distribution Partial -->
<div class="row text-center">
    <div class="col-3">
        <div class="card border-0 bg-danger bg-opacity-10">
            <div class="card-body py-3">
                <div class="text-danger fs-4 fw-bold">{{ distribution.high }}</div>
                <div class="small text-muted">High Risk</div>
            </div>
        </div>
    </div>
    <div class="col-3">
        <div class="card border-0 bg-warning bg-opacity-10">
            <div class="card-body py-3">
                <div class="text-warning fs-4 fw-bold">{{ distribution.medium }}</div>
                <div class="small text-muted">Medium Risk</div>
            </div>
        </div>
    </div>
    <div class="col-3">
        <div class="card border-0 bg-info bg-opacity-10">
            <div class="card-body py-3">
                <div class="text-info fs-4 fw-bold">{{ distribution.low }}</div>
                <div class="small text-muted">Low Risk</div>
            </div>
        </div>
    </div>
    <div class="col-3">
        <div class="card border-0 bg-success bg-opacity-10">
            <div class="card-body py-3">
                <div class="text-success fs-4 fw-bold">{{ distribution.clean }}</div>
                <div class="small text-muted">Clean</div>
            </div>
        </div>
    </div>
</div>

<div class="mt-3">
    <canvas id="securityDistributionChart" width="400" height="200"></canvas>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const ctx = document.getElementById('securityDistributionChart').getContext('2d');
        const distribution = {{ distribution | tojson }};
        
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['High Risk', 'Medium Risk', 'Low Risk', 'Clean'],
                datasets: [{
                    data: [distribution.high, distribution.medium, distribution.low, distribution.clean],
                    backgroundColor: [
                        'rgba(220, 53, 69, 0.8)',    // Red for high
                        'rgba(255, 193, 7, 0.8)',    // Yellow for medium
                        'rgba(13, 202, 240, 0.8)',   // Blue for low
                        'rgba(25, 135, 84, 0.8)'     // Green for clean
                    ],
                    borderColor: [
                        'rgba(220, 53, 69, 1)',
                        'rgba(255, 193, 7, 1)',
                        'rgba(13, 202, 240, 1)',
                        'rgba(25, 135, 84, 1)'
                    ],
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        position: 'bottom'
                    }
                }
            }
        });
    });
    </script>
</div>
