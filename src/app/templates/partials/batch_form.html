<!-- Batch Form Partial -->
<form hx-post="{{ url_for('analysis.start_batch_analysis') }}" 
      hx-target="#batch-form-result"
      hx-swap="innerHTML">
    
    <!-- Analysis Types -->
    <div class="mb-4">
        <label class="form-label">
            <i class="fas fa-tasks me-2"></i>Analysis Types
        </label>
        <div class="row">
            <div class="col-md-6">
                <div class="form-check mb-2">
                    <input class="form-check-input" type="checkbox" id="security" name="analysis_types" value="security" checked>
                    <label class="form-check-label" for="security">
                        <strong>Security Analysis</strong>
                        <br><small class="text-muted">Static and dynamic security testing</small>
                    </label>
                </div>
                <div class="form-check mb-2">
                    <input class="form-check-input" type="checkbox" id="performance" name="analysis_types" value="performance">
                    <label class="form-check-label" for="performance">
                        <strong>Performance Testing</strong>
                        <br><small class="text-muted">Load and stress testing</small>
                    </label>
                </div>
            </div>
            <div class="col-md-6">
                <div class="form-check mb-2">
                    <input class="form-check-input" type="checkbox" id="quality" name="analysis_types" value="quality">
                    <label class="form-check-label" for="quality">
                        <strong>Code Quality</strong>
                        <br><small class="text-muted">Static code analysis and metrics</small>
                    </label>
                </div>
                <div class="form-check mb-2">
                    <input class="form-check-input" type="checkbox" id="ai" name="analysis_types" value="ai">
                    <label class="form-check-label" for="ai">
                        <strong>AI Analysis</strong>
                        <br><small class="text-muted">LLM-powered code review</small>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <!-- Model Filter -->
    <div class="mb-4">
        <label class="form-label">
            <i class="fas fa-robot me-2"></i>Model Filter
        </label>
        <select class="form-select" name="model_filter" multiple size="4">
            <option value="">All Models</option>
            {% for model in models %}
            <option value="{{ model.model_slug }}">{{ model.model_name }} ({{ model.provider|title }})</option>
            {% endfor %}
        </select>
        <div class="form-text">Hold Ctrl/Cmd to select multiple models, or leave empty for all models</div>
    </div>

    <!-- Application Filter -->
    <div class="mb-4">
        <label class="form-label">
            <i class="fas fa-filter me-2"></i>Application Filter
        </label>
        <div class="row">
            <div class="col-md-6">
                <label for="app-range-start" class="form-label">App Number Range</label>
                <div class="input-group">
                    <input type="number" class="form-control" id="app-range-start" name="app_range_start" 
                           placeholder="Start" min="1" max="30" value="1">
                    <span class="input-group-text">to</span>
                    <input type="number" class="form-control" id="app-range-end" name="app_range_end" 
                           placeholder="End" min="1" max="30" value="30">
                </div>
            </div>
            <div class="col-md-6">
                <label for="priority" class="form-label">Priority</label>
                <select class="form-select" id="priority" name="priority">
                    <option value="low">Low</option>
                    <option value="normal" selected>Normal</option>
                    <option value="high">High</option>
                    <option value="urgent">Urgent</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Advanced Options -->
    <div class="card mb-4">
        <div class="card-header">
            <h6 class="card-title mb-0">
                <i class="fas fa-cogs me-2"></i>Advanced Options
            </h6>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-6">
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="checkbox" id="parallel" name="parallel_execution" checked>
                        <label class="form-check-label" for="parallel">
                            Enable parallel execution
                        </label>
                    </div>
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="checkbox" id="notifications" name="enable_notifications" checked>
                        <label class="form-check-label" for="notifications">
                            Enable notifications
                        </label>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="checkbox" id="auto-cleanup" name="auto_cleanup">
                        <label class="form-check-label" for="auto-cleanup">
                            Auto-cleanup temporary files
                        </label>
                    </div>
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="checkbox" id="detailed-reports" name="detailed_reports" checked>
                        <label class="form-check-label" for="detailed-reports">
                            Generate detailed reports
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Form Result -->
    <div id="batch-form-result" class="mb-3">
        <!-- Results will appear here -->
    </div>

    <!-- Form Actions -->
    <div class="d-flex justify-content-between">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
            <i class="fas fa-times me-2"></i>Cancel
        </button>
        <div>
            <button type="button" class="btn btn-outline-primary me-2" onclick="resetBatchForm()">
                <i class="fas fa-undo me-2"></i>Reset
            </button>
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-play me-2"></i>Start Batch Analysis
            </button>
        </div>
    </div>
</form>

<script>
function resetBatchForm() {
    // Reset form to defaults
    document.getElementById('security').checked = true;
    document.getElementById('performance').checked = false;
    document.getElementById('quality').checked = false;
    document.getElementById('ai').checked = false;
    
    document.querySelector('select[name="model_filter"]').selectedIndex = 0;
    document.getElementById('app-range-start').value = '1';
    document.getElementById('app-range-end').value = '30';
    document.getElementById('priority').value = 'normal';
    
    document.getElementById('parallel').checked = true;
    document.getElementById('notifications').checked = true;
    document.getElementById('auto-cleanup').checked = false;
    document.getElementById('detailed-reports').checked = true;
    
    document.getElementById('batch-form-result').innerHTML = '';
}

// Form validation
document.addEventListener('DOMContentLoaded', function() {
    const form = document.querySelector('form[hx-post]');
    const submitBtn = form.querySelector('button[type="submit"]');
    
    function validateForm() {
        const hasAnalysisType = document.querySelectorAll('input[name="analysis_types"]:checked').length > 0;
        
        submitBtn.disabled = !hasAnalysisType;
        
        if (!hasAnalysisType) {
            submitBtn.title = 'Please select at least one analysis type';
        } else {
            submitBtn.title = '';
        }
    }
    
    // Add event listeners for validation
    document.querySelectorAll('input[name="analysis_types"]').forEach(checkbox => {
        checkbox.addEventListener('change', validateForm);
    });
    
    // Initial validation
    validateForm();
});
</script>
