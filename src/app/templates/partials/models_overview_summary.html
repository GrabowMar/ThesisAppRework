<!-- Models Overview Summary Partial -->
<div class="row text-center">
    <div class="col-md-4">
        <div class="card border-0 bg-light">
            <div class="card-body">
                <h5 class="card-title text-primary">{{ summary.total_models }}</h5>
                <p class="card-text small text-muted">Total Models</p>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card border-0 bg-light">
            <div class="card-body">
                <h5 class="card-title text-success">{{ summary.total_apps }}</h5>
                <p class="card-text small text-muted">Generated Apps</p>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card border-0 bg-light">
            <div class="card-body">
                <h5 class="card-title text-info">{{ summary.providers|length }}</h5>
                <p class="card-text small text-muted">Providers</p>
            </div>
        </div>
    </div>
</div>

{% if summary.providers %}
<div class="mt-3">
    <h6 class="text-muted">Provider Breakdown</h6>
    <div class="row">
        {% for provider in summary.providers %}
        <div class="col-sm-6 col-md-4 mb-2">
            <div class="d-flex justify-content-between align-items-center p-2 border rounded">
                <span class="text-capitalize">{{ provider.name }}</span>
                <span class="badge bg-secondary">{{ provider.count }}</span>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endif %}
