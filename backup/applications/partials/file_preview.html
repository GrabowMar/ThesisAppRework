{# slug: pages/applications/partials/file_preview (auto-migrated) #}
<div class="card">
  <div class="card-header d-flex justify-content-between align-items-center">
    <div class="small text-muted">{{ file.rel_path }} · {{ file.size }} bytes</div>
    <a class="btn btn-sm btn-outline-secondary" href="/models/application/{{ app_data.model_slug }}/{{ app_data.app_number }}/export.csv">Export CSV</a>
  </div>
  <div class="card-body">
    {% if truncated %}
      <div class="alert alert-warning py-1">Large file preview truncated to 200 KB.</div>
    {% endif %}
    <pre class="bg-body-tertiary rounded p-2" style="max-height: 500px; overflow:auto; white-space: pre-wrap">{{ content }}</pre>
  </div>
</div>
