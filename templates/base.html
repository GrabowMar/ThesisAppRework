<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Research Platform{% endblock %}</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
    
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10/dist/ext/json-enc.js"></script>
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% block layout %}
    <!-- Default simple layout - can be overridden by specific layouts -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
    {% endblock %}

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Core Scripts -->
    <script>
        // Global utility functions
        const AppUtils = {
            // Show toast notification
            showToast(message, type = 'info') {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                
                const icon = {
                    success: 'check-circle',
                    error: 'exclamation-circle',
                    warning: 'exclamation-triangle',
                    info: 'info-circle'
                }[type];
                
                toast.innerHTML = `
                    <i class="fas fa-${icon}"></i>
                    <span>${message}</span>
                    <button onclick="this.parentElement.remove()" style="margin-left: auto; background: none; border: none; cursor: pointer;">
                        <i class="fas fa-times"></i>
                    </button>
                `;
                
                container.appendChild(toast);
                
                setTimeout(() => {
                    toast.style.animation = 'slideIn 0.3s ease reverse';
                    setTimeout(() => toast.remove(), 300);
                }, 5000);
            },

            // Close all modals
            closeAllModals() {
                document.querySelectorAll('.modal.show').forEach(modal => {
                    modal.classList.remove('show');
                    modal.style.display = 'none';
                });
            }
        };

        // Setup HTMX handlers
        document.body.addEventListener('htmx:afterRequest', (event) => {
            if (event.detail.successful) {
                AppUtils.showToast('Operation completed successfully', 'success');
            }
        });

        document.body.addEventListener('htmx:responseError', (event) => {
            AppUtils.showToast('An error occurred. Please try again.', 'error');
            console.error('HTMX Error:', event.detail);
        });

        // Global keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            // Escape - Close modals
            if (e.key === 'Escape') {
                AppUtils.closeAllModals();
            }
        });
    </script>

    <!-- Load additional scripts -->
    <script src="{{ url_for('static', filename='js/errorHandling.js') }}"></script>
    <script src="{{ url_for('static', filename='js/dynamic-styles.js') }}"></script>    
    {% block extra_js %}{% endblock %}
    {% block scripts %}{% endblock %}
</body>
</html>
