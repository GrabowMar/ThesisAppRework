<!DOCTYPE html>
<html>
<head>
    <title>HTMX Test</title>
    <script src="https://unpkg.com/htmx.org@1.9.10/dist/htmx.min.js"></script>
</head>
<body>
    <div id="test-content" 
         hx-get="http://localhost:5000/analysis/api/active-tasks" 
         hx-trigger="load"
         hx-target="#test-content">
        Loading...
    </div>
    
    <div id="test-content-2" 
         hx-get="http://localhost:5000/analysis/api/recent/combined" 
         hx-trigger="load"
         hx-target="#test-content-2">
        Loading recent...
    </div>
    
    <script>
    console.log('HTMX loaded:', typeof htmx !== 'undefined');
    document.addEventListener('htmx:afterSwap', function(evt) {
        console.log('HTMX swap completed:', evt.target.id);
    });
    document.addEventListener('htmx:responseError', function(evt) {
        console.error('HTMX error:', evt.detail);
    });
    </script>
</body>
</html>
